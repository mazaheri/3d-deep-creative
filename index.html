<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Creative Studio — Hero Light</title>
    <meta name="description" content="Deep Creative Studio — a 3D creative agency crafting immersive digital experiences, motion design, and interactive web worlds.">
    <meta property="og:title" content="Deep Creative Studio">
    <meta property="og:description" content="Immersive 3D digital experiences and motion design.">
    <meta property="og:type" content="website">
    <link rel="preload" href="logo_3d_optimized.glb" as="fetch" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.166/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166/examples/jsm/"
      }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000005;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* Loading screen */
        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000005;
            transition: opacity 0.8s ease;
        }
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loader-ring {
            width: 48px;
            height: 48px;
            border: 2px solid rgba(38,178,219,0.15);
            border-top-color: rgba(38,178,219,0.85);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        .loader-label {
            margin-top: 1rem;
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(100, 220, 255, 0.50);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) {
            .loader-ring { animation: none; border-top-color: rgba(38,178,219,0.85); }
        }

        /* Layer 1 — Three.js 3D logo */
        #three-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            cursor: default;
            /* CSS glow — respects alpha, never bleeds into background */
            filter: drop-shadow(0 0 3px rgba(38, 178, 219, 0.60))
                    drop-shadow(0 0 1px rgba(118, 224, 250, 0.40));
        }


        /* Layer 4 — text UI */
        #ui-layer {
            position: fixed;
            bottom: 2rem;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        #hint {
            color: rgba(100, 220, 255, 0.85);
            font-size: 0.82rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            user-select: none;
        }

        /* ── Studio name ── */
        #studio-name {
            position: fixed;
            top: calc(50% + 15vh);
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
            transition: opacity 0.5s ease;
        }

        /* Expanding rule that draws before the words appear */
        .sn-rule {
            height: 1px;
            width: 0;
            margin: 0 auto 14px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(38,178,219,0.25) 15%,
                rgba(118,224,250,0.75) 50%,
                rgba(38,178,219,0.25) 85%,
                transparent 100%
            );
            animation: sn-expand 1s cubic-bezier(0.4,0,0.2,1) 1.3s forwards;
        }
        @keyframes sn-expand { to { width: 220px; } }

        .sn-words {
            display: flex;
            align-items: center;
            gap: 0.65em;
            position: relative;
            overflow: hidden; /* clips the sweep */
        }

        /* Scan-light sweep — mirrors the 3D logo scan beam */
        .sn-words::before {
            content: '';
            position: absolute;
            inset: -30% 0;
            left: -70%;
            width: 45%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(180, 235, 255, 0.22) 40%,
                rgba(220, 248, 255, 0.38) 50%,
                rgba(180, 235, 255, 0.22) 60%,
                transparent 100%
            );
            mix-blend-mode: screen;
            animation: sn-sweep 8s cubic-bezier(0.4, 0, 0.6, 1) 3.2s infinite;
            pointer-events: none;
        }
        @keyframes sn-sweep {
            0%, 65%, 100% { left: -70%; }
            30%            { left: 120%; }
        }

        /* Each word is clipped so the rise plays as a reveal from the rule */
        .sn-clip {
            overflow: hidden;
            padding: 0.12em 0;
        }

        .sn-sep {
            font-size: 0.45rem;
            color: rgba(38, 178, 219, 0.40);
            line-height: 1;
            transform: translateY(2px);
            opacity: 0;
            animation: sn-sep-in 0.3s ease 2.1s forwards;
        }
        @keyframes sn-sep-in { to { opacity: 1; } }

        .sn-w {
            display: block;
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 0.96rem;
            font-weight: 500;
            letter-spacing: 0.40em;
            text-transform: uppercase;
            /* Gradient text — cyan edge → white centre → cyan edge */
            background: linear-gradient(
                135deg,
                rgba(38,178,219,0.90)  0%,
                rgba(118,224,250,0.95) 35%,
                rgba(220,248,255,1.00) 50%,
                rgba(118,224,250,0.95) 65%,
                rgba(38,178,219,0.90)  100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Neon depth glow — three layers like the 3D logo */
            filter:
                drop-shadow(0 0  4px rgba(38,178,219,0.80))
                drop-shadow(0 0 12px rgba(38,178,219,0.45))
                drop-shadow(0 0 28px rgba(38,178,219,0.20));
            /* Start hidden below the clip line */
            transform: translateY(115%);
            opacity: 0;
            animation: sn-rise 0.75s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .sn-clip-1 .sn-w { animation-delay: 1.55s; }
        .sn-clip-2 .sn-w { animation-delay: 1.80s; }
        .sn-clip-3 .sn-w { animation-delay: 2.05s; }

        @keyframes sn-rise {
            to { transform: translateY(0); opacity: 1; }
        }

        @media (prefers-reduced-motion: reduce) {
            .sn-rule, .sn-w, .sn-sep { animation: none; width: 220px; opacity: 1; transform: none; }
            .sn-words::before { animation: none; }
        }

        /* Visually hidden — accessible to screen readers, invisible on screen */
        .sr-only {
            position: absolute;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }

        /* Reduce / pause non-essential animations for users who prefer it */
        @media (prefers-reduced-motion: reduce) { }

        /* ── Planet / section layers ── */
        .planet-layer {
            position: fixed; inset: 0; z-index: 20;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.8s ease;
        }
        .planet-layer.visible { opacity: 1; pointer-events: auto; }

        .pl-eyebrow {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.62rem; font-weight: 500;
            letter-spacing: 0.38em; text-transform: uppercase;
            color: rgba(100, 220, 255, 0.45);
            margin: 0 0 1rem;
        }
        .pl-title {
            margin: 0 0 0.6rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2rem, 5vw, 3.8rem);
            font-weight: 700; letter-spacing: 0.04em;
            background: linear-gradient(135deg, #a8daff 0%, #ffffff 50%, #70c8ff 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 24px rgba(0,160,255,0.40));
            text-align: center;
        }
        .pl-sub {
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.85rem, 1.6vw, 1.1rem);
            color: rgba(160, 215, 255, 0.55);
            max-width: 480px; text-align: center; line-height: 1.7;
            margin: 0 0 2.4rem; padding: 0 1.5rem;
        }
        .pl-cta {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.72rem; font-weight: 600;
            letter-spacing: 0.25em; text-transform: uppercase;
            color: rgba(100, 200, 255, 0.70);
            border: 1px solid rgba(80, 180, 255, 0.22);
            padding: 0.65rem 1.8rem; border-radius: 2rem;
            background: rgba(0, 40, 80, 0.25);
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: color 0.3s, border-color 0.3s, background 0.3s;
        }
        .pl-cta:hover {
            color: rgba(180, 235, 255, 0.95);
            border-color: rgba(100, 200, 255, 0.50);
            background: rgba(0, 60, 120, 0.35);
        }

        /* Journey progress dots + hint text */
        #space-nav-hint {
            position: fixed; bottom: 2rem; left: 50%;
            transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 0.55rem;
            z-index: 25; pointer-events: none;
            opacity: 0; transition: opacity 0.6s ease;
        }
        #space-nav-hint.visible { opacity: 1; }
        #space-nav-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.60rem; letter-spacing: 0.26em; text-transform: uppercase;
            color: rgba(100, 180, 255, 0.30);
            white-space: nowrap;
        }
        .jd-node {
            width: 5px; height: 5px; border-radius: 50%;
            background: rgba(100, 180, 255, 0.12);
            transition: background 0.5s ease, box-shadow 0.5s ease, transform 0.4s ease;
            flex-shrink: 0;
        }
        .jd-node.visited { background: rgba(100, 180, 255, 0.32); }
        .jd-node.active {
            background: rgba(120, 210, 255, 0.90);
            box-shadow: 0 0 5px rgba(100, 200, 255, 0.80), 0 0 14px rgba(80, 160, 255, 0.35);
            transform: scale(1.55);
            animation: jd-pulse 1.8s ease-in-out infinite;
        }
        @keyframes jd-pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(100,200,255,0.80), 0 0 14px rgba(80,160,255,0.35); }
            50%       { box-shadow: 0 0 8px rgba(100,200,255,1.00), 0 0 22px rgba(80,160,255,0.60); }
        }
        .jd-line {
            width: 22px; height: 1px;
            background: rgba(100, 180, 255, 0.08);
            transition: background 0.5s ease; flex-shrink: 0;
        }
        .jd-line.filled { background: rgba(100, 180, 255, 0.28); }

        /* ── Recent Projects carousel header ── */
        #carousel-header {
            position: fixed; top: 2rem; left: 50%; transform: translateX(-50%);
            z-index: 20; text-align: center; pointer-events: none; white-space: nowrap;
            opacity: 0; transition: opacity 0.7s ease;
        }
        #carousel-header.visible { opacity: 1; }
        .ch-eyebrow {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.60rem; font-weight: 500; letter-spacing: 0.40em; text-transform: uppercase;
            color: rgba(100, 220, 255, 0.40); margin: 0 0 0.55rem;
        }
        .ch-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.2rem, 2.6vw, 2rem); font-weight: 700; letter-spacing: 0.05em;
            background: linear-gradient(135deg, #a8daff 0%, #ffffff 50%, #70c8ff 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 18px rgba(38,178,219,0.45));
            margin: 0;
        }

        /* ── Sound toggle button ── */
        #sound-toggle {
            position: fixed;
            bottom: 4.5rem; right: 2rem;
            z-index: 25;
            width: 44px; height: 44px;
            border-radius: 50%;
            background: rgba(4, 16, 31, 0.65);
            border: 1px solid rgba(100, 200, 255, 0.22);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease, border-color 0.25s, background 0.25s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        #sound-toggle.visible   { opacity: 1; pointer-events: auto; }
        #sound-toggle.sound-on  { border-color: rgba(38,178,219,0.60); background: rgba(0,50,110,0.60); }
        #sound-toggle:hover     { border-color: rgba(100,200,255,0.55); }
        #sound-toggle svg       { width: 20px; height: 20px; pointer-events: none; }

        /* Drag cursor in video zone */
        body.vz-drag { cursor: grabbing !important; }

    </style>
</head>
<body>


    <!-- Loading screen — visible until GLB is ready -->
    <div id="loading-screen" role="status" aria-label="Loading Deep Creative Studio">
        <div class="loader-ring"></div>
        <p class="loader-label">Loading</p>
    </div>

    <!-- Three.js 3D logo -->
    <canvas id="three-canvas" aria-hidden="true"></canvas>


    <!-- Studio name — below the 3D logo -->
    <div id="studio-name" aria-label="Deep Creative Studio">
        <div class="sn-rule"></div>
        <div class="sn-words">
            <div class="sn-clip sn-clip-1"><span class="sn-w">Deep</span></div>
            <span class="sn-sep">·</span>
            <div class="sn-clip sn-clip-2"><span class="sn-w">Creative</span></div>
            <span class="sn-sep">·</span>
            <div class="sn-clip sn-clip-3"><span class="sn-w">Studio</span></div>
        </div>
    </div>

    <!-- Hint text -->
    <div id="ui-layer">
        <h1 class="sr-only">Deep Creative Studio — Interactive 3D Experience</h1>
        <p id="hint"><!-- text set by JS based on device --></p>
    </div>



    <!-- ── Three.js 3D logo (transparent overlay) ── -->
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        const threeCanvas = document.getElementById('three-canvas');

        const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);

        const scene  = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.set(0, 0, 3.5);

        // Lights — brand-colour palette, visible at rest, brighter on hover
        scene.add(new THREE.AmbientLight(0x1a4a7a, 3.5));
        const key  = new THREE.PointLight(0x66bbff, 22); key.position.set(-2, 2.5, 2.5);   scene.add(key);
        const fill = new THREE.PointLight(0x4499ff, 12); fill.position.set(2.5, 1, 1.5);    scene.add(fill);
        const rim1 = new THREE.PointLight(0x66bbff, 18); rim1.position.set(0.5, 1.8, -2);  scene.add(rim1);
        const rim2 = new THREE.PointLight(0x2255cc, 14); rim2.position.set(-0.5, 1.5, -2); scene.add(rim2);

        // Narrow scan light — sweeps across the logo face like a photocopier/radar beam
        // Short range (0.32) means only a thin vertical strip is lit at any moment
        const scanLight = new THREE.PointLight(0x4499ff, 0, 0.32);
        scene.add(scanLight);
        let scanTimer    = 2.0;
        let scanActive   = false;
        let scanProgress = 0;
        let scanDir      = 1;

        // Idle pulse-flash light — fires on every 2nd idle pulse when not hovering
        // Positioned slightly above and in front so it creates visible depth/shadows
        const pulseFlashLight = new THREE.PointLight(0xaaddff, 0, 0);
        pulseFlashLight.position.set(0, 0.35, 2.0);
        scene.add(pulseFlashLight);
        let pulseFlashActive = false;
        let pulseFlashT      = 0;
        let pulseSineSign    = 1;  // tracks zero-crossings to count completed pulses
        let pulseCounter     = 0;

        // Mouse proximity light — follows cursor, fades in near centre
        const mouseLight = new THREE.PointLight(0x4499ff, 0, 0);
        mouseLight.position.set(0, 0, 1.5);
        scene.add(mouseLight);

        // Mouse → proximity tracking (drives all interactive behaviour)
        const _ray = new THREE.Raycaster();
        const _mouseTarget = new THREE.Vector3(0, 0, 1.5);
        let proximity       = 0; // 0 = far, 1 = dead centre — smoothed each frame
        let targetProximity = 0;

        window.addEventListener('mousemove', e => {
            const nx = (e.clientX / window.innerWidth)  * 2 - 1;
            const ny = -(e.clientY / window.innerHeight) * 2 + 1;
            _ray.setFromCamera({ x: nx, y: ny }, camera);
            _ray.ray.at(2.0, _mouseTarget);
            const screenDist = Math.sqrt(
                (e.clientX - window.innerWidth  / 2) ** 2 +
                (e.clientY - window.innerHeight / 2) ** 2
            );
            const hoverR = Math.min(window.innerWidth, window.innerHeight) * 0.22;
            targetProximity = Math.max(0, 1 - screenDist / hoverR);
        });

        // Subtle env map so clearcoat has something to reflect
        const pmrem = new THREE.PMREMGenerator(renderer);
        pmrem.compileEquirectangularShader();
        scene.environment = pmrem.fromScene(new RoomEnvironment()).texture;
        scene.environmentIntensity = 0.05;
        pmrem.dispose();

        // ── GPU Star Field ──
        // All effects (twinkle, mouse repulsion, sharp spikes) live in GLSL — zero CPU per frame
        const _starCount = 6000;
        {
            const pos   = new Float32Array(_starCount * 3);
            const col   = new Float32Array(_starCount * 3);
            const sizes = new Float32Array(_starCount);

            for (let i = 0; i < _starCount; i++) {
                const r     = 4 + Math.pow(Math.random(), 0.5) * 55;
                const theta = Math.random() * Math.PI * 2;
                const phi   = Math.acos(2 * Math.random() - 1);
                pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
                pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta) * 0.55;
                pos[i*3+2] = r * Math.cos(phi);
                const t    = Math.random();
                col[i*3]   = 0.62 + t * 0.38;
                col[i*3+1] = 0.78 + t * 0.22;
                col[i*3+2] = 0.92 + t * 0.08;
                sizes[i]   = 0.28 + Math.random() * 1.1;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos,   3));
            geo.setAttribute('color',    new THREE.BufferAttribute(col,   3));
            geo.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

            window._starMat = new THREE.ShaderMaterial({
                vertexColors: true,
                transparent: true,
                depthWrite: false,
                uniforms: {
                    uTime:       { value: 0 },
                    uMouseWorld: { value: new THREE.Vector3(999, 999, 999) },
                },
                vertexShader: `
                    attribute float size;
                    varying   vec3  vColor;
                    varying   float vPointSize;
                    varying   float vTwinkle;
                    uniform   float uTime;
                    uniform   vec3  uMouseWorld;

                    void main() {
                        vColor = color;

                        // Per-star seed from position
                        float seed = position.x * 13.7 + position.y * 7.3 + position.z * 4.1;

                        // Twinkle — each star has its own frequency
                        vTwinkle = 0.70 + 0.30 * sin(uTime * (1.4 + mod(abs(seed), 1.9)) + seed);

                        // Mouse repulsion — GPU only, no CPU loop needed
                        vec3  toMouse = position - uMouseWorld;
                        float mDist   = length(toMouse.xy);
                        float repel   = smoothstep(3.8, 0.0, mDist) * 1.4;
                        vec3  pos     = position + normalize(toMouse + vec3(0.001)) * repel;

                        vec4  mv      = modelViewMatrix * vec4(pos, 1.0);
                        float camDist = -mv.z;
                        gl_PointSize  = size * vTwinkle * (300.0 / camDist);
                        vPointSize    = gl_PointSize;
                        gl_Position   = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3  vColor;
                    varying float vPointSize;
                    varying float vTwinkle;

                    void main() {
                        vec2  uv = gl_PointCoord * 2.0 - 1.0;
                        float r  = length(uv);
                        if (r > 1.0) discard;

                        // 4-point diffraction spikes (sharp star shape)
                        float angle  = atan(uv.y, uv.x);
                        float spikes = pow(abs(sin(angle * 2.0)), 10.0);
                        float spike_alpha = spikes * smoothstep(1.0, 0.05, r) * 0.90;

                        // Soft glowing core + wide glow halo
                        float core = smoothstep(0.40, 0.0, r);
                        float halo = smoothstep(1.0,  0.4, r) * 0.15;

                        // Near/bright stars (larger pointSize) get sharp spikes
                        // Distant stars stay as soft glowing blobs
                        float sharpness = smoothstep(2.5, 9.0, vPointSize);
                        float alpha = halo + mix(core * 0.75, core + spike_alpha, sharpness);

                        gl_FragColor = vec4(vColor, alpha * vTwinkle);
                    }
                `
            });

            window._starMesh = new THREE.Points(geo, window._starMat);
            scene.add(window._starMesh);
        }

        // ── Deep-space stars — round dots via ShaderMaterial (no cubes), covers travel path ──
        {
            const COUNT = 3500;
            const pos = new Float32Array(COUNT * 3);
            for (let i = 0; i < COUNT; i++) {
                pos[i*3]   = (Math.random() - 0.5) * 300;
                pos[i*3+1] = (Math.random() - 0.5) * 150;
                pos[i*3+2] = Math.random() * -230 + 50;
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            scene.add(new THREE.Points(geo, new THREE.ShaderMaterial({
                transparent: true, depthWrite: false,
                vertexShader: `
                    void main() {
                        vec4 mv = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = max(1.0, 1.6 * (180.0 / -mv.z));
                        gl_Position  = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    void main() {
                        vec2 uv = gl_PointCoord * 2.0 - 1.0;
                        if (length(uv) > 1.0) discard;
                        float a = (1.0 - length(uv)) * 0.70;
                        gl_FragColor = vec4(0.78, 0.88, 1.0, a);
                    }
                `
            })));
        }


        // ── Comet system ──
        // 3 comet slots × 13 segments each = 39 GPU points total.
        // Head + tail positions computed entirely in GLSL from 3 uniforms per comet.
        // CPU cost: 3 uniform writes on click, nothing per frame.
        const COMET_MAX  = 3;
        const COMET_SEGS = 9;
        const COMET_DUR  = 6.0;

        const cSegAttr = new Float32Array(COMET_MAX * COMET_SEGS); // 0=head … 12=tail tip
        const cIdxAttr = new Float32Array(COMET_MAX * COMET_SEGS); // 0,1,2 — which comet
        const cPosAttr = new Float32Array(COMET_MAX * COMET_SEGS * 3);
        for (let ci = 0; ci < COMET_MAX; ci++) {
            for (let s = 0; s < COMET_SEGS; s++) {

                attribute float aSegment;
                attribute float aComet;
                varying   float vSeg;
                varying   float vLife;

                uniform float uTime;
                uniform vec3  uCometStart[3];
                uniform vec3  uCometDir[3];
                uniform float uCometBirth[3];

                void main() {
                    // Select this comet's data (if-else for WebGL 1.0 safety)
                    vec3  cStart; vec3 cDir; float cBirth;
                    if      (aComet < 0.5) { cStart=uCometStart[0]; cDir=uCometDir[0]; cBirth=uCometBirth[0]; }
                    else if (aComet < 1.5) { cStart=uCometStart[1]; cDir=uCometDir[1]; cBirth=uCometBirth[1]; }
                    else                   { cStart=uCometStart[2]; cDir=uCometDir[2]; cBirth=uCometBirth[2]; }

                    float age  = uTime - cBirth;
                    float t    = clamp(age / ${COMET_DUR.toFixed(1)}, 0.0, 1.05);

                    // Head moves at 2.5 world-units per second; tail trails behind
                    vec3  head = cStart + cDir * age * 2.5;

                    // Soft fade-in → hold → fade-out
                    float life = smoothstep(0.0, 0.14, t) * (1.0 - smoothstep(0.65, 1.0, t));

                    vec3  col = mix(vec3(0.42, 0.74, 1.00), vec3(0.92, 0.96, 1.00),
                                   (1.0 - vSeg) * core);

                }
            `

            varying vec2 vUv; varying vec3 vNormal;
            void main() {

                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);

            uniform float uTime;
            uniform vec3  uCol1; uniform vec3 uCol2; uniform vec3 uCol3;
            varying vec2  vUv;   varying vec3 vNormal;
            void main() {
                float n = sin(vUv.x*11.0+uTime*0.22)*cos(vUv.y*7.0-uTime*0.17)
                        + sin(vUv.x*5.5 -uTime*0.11+vUv.y*9.0)*0.55;

            grp.add(new THREE.Mesh(new THREE.SphereGeometry(cfg.r*1.55,24,24),

        const contactPlanet = makePlanet({

        // Build one card per video — each placed at its own world position
        const videoCards = []; // Three.Group refs (for raycasting)
        const _videoEls  = [];
        const _flameMats = []; // per-card flame border ShaderMaterial refs

        // ── Neon Flame Border Shader ──
        // Flame plane is 0.50 units larger than card (0.25 each side).
        // Card edge sits at UV = 0.25/planeSize from each UV border.
        const _FP_W = _CARD_W + 2.0; // 6.5 — 1.0 world unit glow margin each side
        const _FP_H = _CARD_H + 2.0; // 10.0

        const _FLAME_VS = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const _FLAME_FS = `
            precision highp float;
            varying vec2 vUv;
            uniform float uTime;
            uniform float uSeed;
            uniform float uIntensity;
            uniform vec2  uEdge;

            float h1(float n) { return fract(sin(n * 127.1) * 43758.5453); }
            float h2(vec2 p) {
                p = fract(p * vec2(0.1031, 0.1030));
                p += dot(p, p.yx + 33.33);
                return fract((p.x + p.y) * p.x);
            }
            float vnoise(vec2 p) {
                vec2 i = floor(p); vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                return mix(mix(h2(i), h2(i+vec2(1,0)), f.x),
                           mix(h2(i+vec2(0,1)), h2(i+vec2(1,1)), f.x), f.y);
            }

            void main() {
                vec2 uv = vUv;
                // Slow time = organic, natural movement
                float t = uTime * 0.55 + uSeed;

                // Rectangle SDF: negative = inside card, positive = outside
                vec2 halfSize = vec2(0.5 - uEdge.x, 0.5 - uEdge.y);
                vec2 p = uv - 0.5;
                vec2 q = abs(p) - halfSize;
                float sdf  = length(max(q, 0.0)) + min(max(q.x, q.y), 0.0);
                float outD = max(0.0, sdf); // 0 at border, grows outward
                float outside = step(0.0, sdf); // 1 outside card, 0 inside

                // Normalized along-edge coord (-1 to 1, consistent on all sides)
                float along = (abs(p.x) * halfSize.y > abs(p.y) * halfSize.x)
                            ? p.y / halfSize.y
                            : p.x / halfSize.x;

                // ── Narrow flame tendrils ──
                // Multi-octave value noise, then threshold to keep only peaks
                // (thresholding = isolated narrow wisps instead of broad fill)
                float n1 = vnoise(vec2(along * 11.0 + t * 0.38, t * 0.20));
                float n2 = vnoise(vec2(along * 25.0 + t * 0.62, t * 0.32 + 1.7));
                float n3 = vnoise(vec2(along * 48.0 + t * 0.95, t * 0.48 + 3.3));
                float n4 = vnoise(vec2(along * 85.0 + t * 1.55, t * 0.72 + 5.8));

                // Each octave thresholded: only tops of noise waves survive → narrow peaks
                float f1 = max(0.0, n1 - 0.50) * 2.00;  // broad base wisps
                float f2 = max(0.0, n2 - 0.58) * 2.38;  // medium wisps
                float f3 = max(0.0, n3 - 0.64) * 2.78;  // thin wisps
                float f4 = max(0.0, n4 - 0.70) * 3.33;  // micro wisps

                // Total flame height at this border position
                float flameH = f1 * 0.075 + f2 * 0.038 + f3 * 0.017 + f4 * 0.007;

                // Brightness: only within flame envelope, cubic fade toward tip
                float inEnv    = step(outD, flameH) * outside;
                float tipRatio = max(0.0, 1.0 - outD / max(flameH, 0.0001));
                float flame    = inEnv * tipRatio * tipRatio * tipRatio;

                // ── Continuous base glow (smooth neon-tube quality, no crackle) ──
                float baseGlow = exp(-outD * 20.0) * outside * 0.85;
                float halo     = smoothstep(0.11, 0.0, outD) * outside * 0.55;

                // ── Core bright line: smooth, clean ──
                float core = smoothstep(0.018, 0.001, abs(sdf))
                           * smoothstep(-0.006, 0.004, sdf); // suppress interior

                // ── Corner hotspots ──
                float c00 = length(p - vec2(-halfSize.x, -halfSize.y));
                float c01 = length(p - vec2(-halfSize.x,  halfSize.y));
                float c10 = length(p - vec2( halfSize.x, -halfSize.y));
                float c11 = length(p - vec2( halfSize.x,  halfSize.y));
                float cMin = min(min(c00, c01), min(c10, c11));
                float cornerH = smoothstep(0.055, 0.0, cMin)
                              * (0.55 + 0.45 * sin(t * 4.2 + uSeed * 2.1));

                // ── Soft glowing particles (slow drift, large soft glow) ──
                float sparks = 0.0;
                for (int k = 0; k < 14; k++) {
                    float fk   = float(k) * 1.618 + uSeed * 3.9;
                    float bPos = fract(h1(fk) + t * 0.4 * (0.055 + h1(fk+1.0) * 0.09));
                    vec2 sp;
                    float bT = bPos * 4.0;
                    if      (bT < 1.0) sp = vec2(mix(-halfSize.x,  halfSize.x, bT       ),  -halfSize.y);
                    else if (bT < 2.0) sp = vec2( halfSize.x,  mix(-halfSize.y, halfSize.y, bT - 1.0));
                    else if (bT < 3.0) sp = vec2(mix( halfSize.x, -halfSize.x, bT - 2.0),    halfSize.y);
                    else               sp = vec2(-halfSize.x,  mix( halfSize.y,-halfSize.y, bT - 3.0));
                    sp += normalize(sp + vec2(0.0001)) * (0.007 + h1(fk+2.0) * 0.042);
                    float life = sin(fract(h1(fk+5.0) + t * 0.4 * (0.15 + h1(fk+6.0) * 0.18)) * 3.14159);
                    float sz   = 0.007 + h1(fk+7.0) * 0.008;
                    sparks    += smoothstep(sz, sz * 0.15, length(p - sp)) * life * 0.65;
                }
                sparks = min(sparks, 1.2);

                // ── Assemble ──
                float I = (core    * 3.5
                         + flame   * 3.0
                         + baseGlow * 1.0
                         + halo    * 0.6
                         + cornerH * 1.4
                         + sparks  * 1.0)
                        * uIntensity;
                I = clamp(I, 0.0, 1.0);

                // Color: deep space blue → electric blue → cyan-white → white at core
                vec3 deepBlue  = vec3(0.02, 0.08, 0.78);
                vec3 elecBlue  = vec3(0.10, 0.44, 1.00);
                vec3 cyanWhite = vec3(0.50, 0.86, 1.00);
                vec3 white     = vec3(0.90, 0.97, 1.00);

                vec3 col = deepBlue;
                col = mix(col, elecBlue,  clamp((halo + baseGlow + flame * 0.5) * 2.2,  0.0, 1.0));
                col = mix(col, cyanWhite, clamp((flame + cornerH * 0.5) * 2.5,          0.0, 1.0));
                col = mix(col, white,     clamp((core + sparks * 0.4) * 2.5,            0.0, 1.0));

                gl_FragColor = vec4(col, I);
            }
        `;

        _VIDEO_SRCS.forEach((src, i) => {
            const cfg = VIDEO_CONFIGS[i];

            const vid = document.createElement('video');

                side:           THREE.DoubleSide,
                uniforms: {
                    uTime:      { value: 0 },
                    uSeed:      { value: i * 2.718 + 0.5 },
                    uIntensity: { value: 0.7 },
                    uEdge:      { value: new THREE.Vector2(1.0 / _FP_W, 1.0 / _FP_H) },
                },
            });
            _flameMats.push(flameMat);
            const flameMesh = new THREE.Mesh(
                new THREE.PlaneGeometry(_FP_W, _FP_H),
                flameMat
            );
            flameMesh.position.z = 0.01;
            card.add(flameMesh);

            card.visible = false;
            scene.add(card);
            videoCards.push(card);
        });

        // ── Sound + drag state ──
        let _soundOn = false;
        let _isDragging = false, _dragStartX = 0, _dragConsumed = false;

        const _SVG_MUTED = `<svg viewBox="0 0 24 24" fill="none" stroke="rgba(100,220,255,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`;
        const _SVG_SOUND = `<svg viewBox="0 0 24 24" fill="none" stroke="rgba(100,220,255,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;

        if (soundToggleBtn) soundToggleBtn.innerHTML = _SVG_MUTED;

        function _updateVideoAudio() {
            _videoEls.forEach((v, i) => { v.muted = !(i === videoIndex && _soundOn); });
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ── Mouse drag navigation (desktop) ──
        window.addEventListener('mousedown', e => {
            if (scrollTarget !== 2) return;
            _dragStartX   = e.clientX;
            _isDragging   = true;
            _dragConsumed = false;
        });
        window.addEventListener('mousemove', e => {
            if (!_isDragging) return;
            if (Math.abs(e.clientX - _dragStartX) > 10) document.body.classList.add('vz-drag');
        });
        window.addEventListener('mouseup', e => {
            if (!_isDragging) return;
            document.body.classList.remove('vz-drag');
            _isDragging = false;
            if (scrollTarget !== 2) return;
            const dx = e.clientX - _dragStartX;
            if (Math.abs(dx) >= 55) {
                _dragConsumed = true;
                const dir = dx > 0 ? -1 : 1; // drag right = go back, drag left = go forward
                videoIndex = (videoIndex + dir + _VIDEO_SRCS.length) % _VIDEO_SRCS.length;
                seenVideos.add(videoIndex);
                _updateVideoAudio();
            }
        });

        let scrollLocked = false;

        function flyLock() {
            scrollLocked = true;
            const check = setInterval(() => {
                if (Math.abs(scrollProgress - scrollTarget) < 0.03) { scrollLocked = false; clearInterval(check); }
            }, 100);
        }

        function _navigateVideo(forward) {
            if (forward) {
                if (videoIndex < _VIDEO_SRCS.length - 1) {
                    videoIndex++;
                    seenVideos.add(videoIndex);
                    _updateVideoAudio();
                } else if (seenVideos.size >= 3) {
                    scrollTarget = 3; flyLock(); // exit to contact planet
                }
            } else {
                if (videoIndex > 0) {
                    videoIndex--;
                    _updateVideoAudio();
                } else {
                    scrollTarget = 1; flyLock(); // exit backward
                }
            }
        }

        window.addEventListener('wheel', e => {
            e.preventDefault();
            if (scrollLocked) return;
            if (_returning && e.deltaY > 0) return;

            // Video zone: intercept both horizontal and vertical scroll
            if (scrollTarget === 2) {
                const isH  = Math.abs(e.deltaX) > Math.abs(e.deltaY) * 0.7;
                if (isH) {
                    // Horizontal: wrap-around navigation (always loops all cards)
                    const dir = e.deltaX > 0 ? 1 : -1;
                    videoIndex = (videoIndex + dir + _VIDEO_SRCS.length) % _VIDEO_SRCS.length;
                    seenVideos.add(videoIndex);
                    _updateVideoAudio();
                } else {
                    _navigateVideo(e.deltaY > 0);
                }
                return;
            }

            if (e.deltaY > 0 && scrollTarget < MAX_SCROLL) { scrollTarget++; flyLock(); }
            else if (e.deltaY < 0 && scrollTarget > 0)     { scrollTarget--; flyLock(); }
        }, { passive: false });

        let _touchStartY = null, _touchStartX = null;
        window.addEventListener('touchstart', e => {
            _touchStartY = e.touches[0].clientY;
            _touchStartX = e.touches[0].clientX;
        }, { passive: true });
        window.addEventListener('touchend', e => {
            if (_touchStartY === null) return;
            const dy = _touchStartY - e.changedTouches[0].clientY;
            const dx = _touchStartX - e.changedTouches[0].clientX;
            _touchStartY = null; _touchStartX = null;
            if (scrollLocked || (Math.abs(dy) < 40 && Math.abs(dx) < 40)) return;

            // Video zone: both swipe directions navigate cards
            if (scrollTarget === 2) {
                const isH = Math.abs(dx) > Math.abs(dy);
                if (isH) {
                    const dir = dx > 0 ? 1 : -1;
                    videoIndex = (videoIndex + dir + _VIDEO_SRCS.length) % _VIDEO_SRCS.length;
                    seenVideos.add(videoIndex);
                    _updateVideoAudio();
                } else {
                    _navigateVideo(dy > 0);
                }
                return;
            }

            if (_returning && dy > 0) return;
            if (dy > 0 && scrollTarget < MAX_SCROLL) { scrollTarget++; flyLock(); }
            else if (dy < 0 && scrollTarget > 0)     { scrollTarget--; flyLock(); }
        }, { passive: true });

        // Touch mousemove proxy — mirrors mouse proximity tracking on touch devices
        window.addEventListener('touchmove', e => {
            const t  = e.touches[0];
            const nx = (t.clientX / window.innerWidth)  * 2 - 1;
            const ny = -(t.clientY / window.innerHeight) * 2 + 1;
            _ray.setFromCamera({ x: nx, y: ny }, camera);
            _ray.ray.at(2.0, _mouseTarget);
        }, { passive: true });

        // Click on a video card — drone flies to that card (video zone only)
        window.addEventListener('click', e => {
            if (scrollTarget !== 2) return;
            if (_dragConsumed) { _dragConsumed = false; return; }
            const nx = (e.clientX / window.innerWidth) * 2 - 1;
            const ny = -(e.clientY / window.innerHeight) * 2 + 1;
            _ray.setFromCamera({ x: nx, y: ny }, camera);
            for (let i = 0; i < videoCards.length; i++) {
                if (_ray.intersectObjects(videoCards[i].children, false).length > 0) {
                    videoIndex = i;
                    seenVideos.add(i);
                    _updateVideoAudio();
                    return;
                }
            }
        });

        // Click in sky — launch a comet through the clicked point
        window.addEventListener('click', e => {
            if (_dragConsumed) { _dragConsumed = false; return; }
            if (targetProximity > 0.15) return; // don't intercept logo clicks

            const nx = (e.clientX / window.innerWidth)  * 2 - 1;
            const ny = -(e.clientY / window.innerHeight) * 2 + 1;
            _ray.setFromCamera({ x: nx, y: ny }, camera);

            // Place the comet deep in the sky — far enough to look genuinely distant
            const dist = 38 + Math.random() * 16;
            const pt   = _ray.ray.at(dist, new THREE.Vector3());

            // Fully random travel direction across the sphere
            const th      = Math.random() * Math.PI * 2;
            const ph      = Math.acos(2 * Math.random() - 1);
            const moveDir = new THREE.Vector3(
                Math.sin(ph) * Math.cos(th),
                Math.sin(ph) * Math.sin(th),
                Math.cos(ph)
            ).normalize();

            // Start behind the click point so comet is fully lit when it arrives there
            const preTravel = 1.2 + Math.random() * 0.6; // seconds already travelled
            const startPos  = pt.clone().addScaledVector(moveDir, -(preTravel * 3.0));

            const slot = _cometSlot % COMET_MAX;
            _cometSlot++;
            cometMat.uniforms.uCometStart.value[slot].copy(startPos);
            cometMat.uniforms.uCometDir.value[slot].copy(moveDir);
            cometMat.uniforms.uCometBirth.value[slot] = animTime - preTravel;
        });

        // Click on logo scrolls IN only — scroll back is wheel/swipe only
        window.addEventListener('click', () => {
            if (targetProximity < 0.05 || scrollLocked || scrollTarget > 0.5) return;
            scrollTarget = 1;
            scrollLocked = true;
            const check = setInterval(() => {
                if (Math.abs(scrollProgress - scrollTarget) < 0.03) {
                    scrollLocked = false;
                    clearInterval(check);
                }
            }, 100);
        });


        // Sound toggle click
        if (soundToggleBtn) {
            soundToggleBtn.addEventListener('click', e => {
                e.stopPropagation(); // don't fire comet/card handlers
                _soundOn = !_soundOn;
                _updateVideoAudio();
                soundToggleBtn.innerHTML = _soundOn ? _SVG_SOUND : _SVG_MUTED;
                soundToggleBtn.setAttribute('aria-label', _soundOn ? 'Mute' : 'Unmute');
                soundToggleBtn.classList.toggle('sound-on', _soundOn);
            });
        }

        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const isTouch = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
        const hintEl  = document.getElementById('hint');
        let   lastScrollState = '';
        let   _threeRunning   = true;

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                _threeRunning = false;
            } else {
                _threeRunning = true;
                clock.getDelta(); // discard the huge accumulated delta from hidden time
                animate();
            }
        });

        const clock = new THREE.Clock();
        function animate() {
            if (!_threeRunning) return;
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.05); // cap at 50ms — prevents huge jumps after app switch
            animTime += dt;

            // Scroll boosts proximity so logo lights up before fly-through begins
            targetProximity = Math.max(targetProximity, scrollTarget * Math.max(0, 1 - scrollProgress * 2));

            // Smoothly chase target proximity (ease in fast, ease out slower)
            const lerpSpeed = targetProximity > proximity ? 0.06 : 0.025;
            proximity += (targetProximity - proximity) * lerpSpeed;

            // Skip scan beam + pulse flash when user prefers reduced motion
            if (prefersReducedMotion) { renderer.render(scene, camera); return; }

            // Narrow scan beam — moves linearly left→right (or right→left) very close to the logo face
            // Limited range means only a thin vertical strip of the logo is lit at any moment
            scanTimer -= dt;
            if (scanTimer <= 0 && !scanActive) {
                scanActive    = true;
                scanProgress  = 0;
                scanDir       = Math.random() < 0.5 ? 1 : -1;
                scanTimer     = Math.random() * 3 + 3;
            }
            if (scanActive) {
                scanProgress += dt / 2.2; // 2.2 s to cross the full logo width
                const x    = scanDir * (scanProgress * 2 - 1) * 0.65; // -0.65 → +0.65
                const fade = Math.sin(scanProgress * Math.PI);         // ramp in/out
                scanLight.position.set(x, 0, 0.18);                   // very close to logo face
                scanLight.intensity = fade * 55;
                if (scanProgress >= 1) { scanActive = false; scanLight.intensity = 0; }
            }

            // Fire a soft light-up on every idle pulse, from a randomly chosen angle each time
            const sineNow = Math.sin(IDLE_FREQ * 2 * Math.PI * animTime);
            if (pulseSineSign < 0 && sineNow >= 0 && !pulseFlashActive && proximity < 0.12) {
                pulseFlashActive = true;
                pulseFlashT      = 0;
                // True random angle — full sphere around the logo every flash
                const a    = Math.random() * Math.PI * 2;          // any horizontal direction
                const dist = 2.0 + Math.random() * 1.2;           // distance from origin
                const yPos = (Math.random() - 0.4) * 4.0;         // -1.6 … +2.4 (below → high above)
                pulseFlashLight.position.set(
                    Math.cos(a) * dist,                            // left / right
                    yPos,                                          // below / above
                    Math.sin(a) * dist * 0.45 + 0.7               // behind / in front (mostly front)
                );
            }
            pulseSineSign = sineNow < 0 ? -1 : 1;

            if (pulseFlashActive) {
                pulseFlashT += dt;
                const dur = 1.4;
                const t   = pulseFlashT / dur;
                // Asymmetric ease: quick soft ramp-in, long gentle fade-out
                const bell = t < 0.25
                    ? Math.sin((t / 0.25) * Math.PI * 0.5)
                    : Math.cos(((t - 0.25) / 0.75) * Math.PI * 0.5);
                pulseFlashLight.intensity = Math.max(0, bell * 220);
                logoMaterials.forEach(m => { m.emissiveIntensity = 1.90 + bell * 6.0; });
                if (pulseFlashT >= dur) { pulseFlashActive = false; pulseFlashLight.intensity = 0; }
            }

            // All scene lights — gentle hover boost, kept low to avoid oversaturation to yellow
            key.intensity   = 48 + proximity * 10;
            fill.intensity  = 28 + proximity *  8;
            rim1.intensity  = 36 + proximity * 10;
            rim2.intensity  = 28 + proximity *  6;
            mouseLight.position.lerp(_mouseTarget, 0.10);
            mouseLight.intensity = proximity * 14;

            // Smooth scroll progress
            // Smooth return — after arc completes, hero logic glides camera home
            if (scrollTarget >= MAX_SCROLL && scrollProgress >= MAX_SCROLL - 0.08) {
                scrollProgress  = 0;
                scrollTarget    = 0;
                _returning     = true;
                _virtualFlyZ   = -2.5;
                _returnSP      = 1.0;
                _returnRevealT = 0;
            }

            scrollProgress += (scrollTarget - scrollProgress) * 0.055;

            const inHero = scrollProgress <= 1.0;

            // ── Camera ──
            if (inHero) {
                // Hero fly-through
                const hoverZ  = 3.5 - proximity * 0.45 * (1 - scrollProgress);
                const flyZ    = 3.5 - scrollProgress * 6.0;
                const targetZ = hoverZ + (flyZ - hoverZ) * scrollProgress;
                camera.position.x += (0 - camera.position.x) * 0.10;
                camera.position.y += (0 - camera.position.y) * 0.10;
                camera.position.z += (targetZ - camera.position.z) * 0.06;
                _tmpCam2.position.copy(camera.position);
                _tmpCam2.up.set(0, 1, 0);
                _tmpCam2.lookAt(_heroLook);
                camera.quaternion.slerp(_tmpCam2.quaternion, 0.10);
            } else {
                // Space travel — camera follows waypoints OR drones to active video card
                const sp      = scrollProgress - 1.0;

                // ── DRONE MODE: engaged when parked in video zone (scrollTarget=2, sp≥0.8) ──
                if (scrollTarget === 2 && sp > 0.80) {
                    const tPos  = VIDEO_CONFIGS[videoIndex].camPos;
                    const tLook = VIDEO_CONFIGS[videoIndex].pos;
                    camera.position.lerp(tPos, 0.038);
                    _tmpCam2.position.copy(camera.position);
                    _tmpCam2.up.set(0, 1, 0);
                    _tmpCam2.lookAt(tLook);
                    camera.quaternion.slerp(_tmpCam2.quaternion, 0.038);
                } else {

                const i0      = Math.min(Math.floor(sp), SPACE_WP.length - 2);
                const raw     = sp - i0;
                const et      = raw * raw * (3 - 2 * raw); // smoothstep
                const isReturn = i0 === SPACE_WP.length - 2; // last segment = return arc

                if (isReturn) {
                    // Cubic Bézier arc: departs left+up from planet, sweeps wide left through space
                    const p0 = SPACE_WP[i0].pos, p3 = SPACE_WP[i0+1].pos;
                    const u  = 1 - et;
                    _wpCamPos.set(
                        u*u*u*p0.x + 3*u*u*et*_retCtrl1.x + 3*u*et*et*_retCtrl2.x + et*et*et*p3.x,
                        u*u*u*p0.y + 3*u*u*et*_retCtrl1.y + 3*u*et*et*_retCtrl2.y + et*et*et*p3.y,
                        u*u*u*p0.z + 3*u*u*et*_retCtrl1.z + 3*u*et*et*_retCtrl2.z + et*et*et*p3.z
                    );
                    _wpLookAt.set(0, 0, 0);
                    // Hide logo during the arc — it reveals ring-by-ring after landing
                    rings.forEach(r => { r.mesh.position.z = r.baseZ; r.mat.opacity = 0; });
                    logoMaterials.forEach(m => { m.emissiveIntensity = 0; });
                } else {
                    _wpCamPos.lerpVectors(SPACE_WP[i0].pos,  SPACE_WP[i0+1].pos,  et);
                    _wpLookAt.lerpVectors(SPACE_WP[i0].look, SPACE_WP[i0+1].look, et);
                }

                camera.position.lerp(_wpCamPos, 0.055);
                _tmpCam2.position.copy(camera.position);
                _tmpCam2.up.set(0, 1, 0);
                _tmpCam2.lookAt(_wpLookAt);
                const rotSpeed = isReturn ? 0.045 : 0.028;
                camera.quaternion.slerp(_tmpCam2.quaternion, rotSpeed);
                } // end waypoint block
            } // end !inHero

            // Share camera depth with particle canvas (hero only — 0..1 range)
            window._camScrollZ    = Math.max(0, Math.min(1, (3.5 - Math.min(camera.position.z, 3.5)) / 6.0));
            window._proximity     = proximity;
            window._scrollProgress = scrollProgress;

            // ── Logo animation — hero only ──
            if (inHero) {
                logoMaterials.forEach(m => {
                    m.emissive.lerpColors(_idleColor, _hoverColor, proximity);
                    m.emissiveIntensity = _returning
                        ? (1.90 + proximity * 2.00) * Math.min(1, _returnRevealT * 1.5)
                        : 1.90 + proximity * 2.00;
                });

                const amp  = IDLE_AMP  + (PULSE_AMP  - IDLE_AMP)  * proximity;
                const freq = IDLE_FREQ + (PULSE_FREQ - IDLE_FREQ) * proximity;
                const stag = IDLE_STAG + (PULSE_STAG - IDLE_STAG) * proximity;
                const waveAmp = amp * Math.max(0, 1 - scrollProgress * 4);

                if (_returning) {
                    _returnRevealT = Math.min(1, _returnRevealT + dt * 0.8);
                    // Reverse fly-through: virtual camera sweeps Z=-2.5 → 3.5 (mirror of scroll-out)
                    // Rings start in spread state, compress to base; each fades IN as virtual cam passes it
                    _virtualFlyZ = Math.min(3.5, _virtualFlyZ + dt * 4.2); // ~1.4s total sweep
                    _returnSP    = Math.max(0, (3.5 - _virtualFlyZ) / 6.0);// 1→0 as flyZ reaches 3.5
                    rings.forEach((r, idx) => {
                        const waveZ   = r.baseZ + waveAmp * Math.sin(freq * 2 * Math.PI * animTime - idx * stag);
                        const spreadZ = r.baseZ - idx * 0.65 * _returnSP;
                        r.mesh.position.z = waveZ * (1 - _returnSP) + spreadZ * _returnSP;
                        r.mesh.getWorldPosition(_ringWorldPos);
                        // Ring fades in when virtual camera passes it — same 0.30-unit window as scroll-out
                        const virtualAhead = _virtualFlyZ - _ringWorldPos.z;
                        const ringOpacity  = Math.max(0, Math.min(1, virtualAhead / 0.30));
                        r.mat.opacity = ringOpacity;
                        r.mat.emissive.lerpColors(_idleColor, _hoverColor, proximity);
                        r.mat.emissiveIntensity = (1.90 + proximity * 2.00) * ringOpacity;
                    });
                    if (_virtualFlyZ >= 3.5) _returning = false;
                } else {
                    // Normal hero ring animation
                    rings.forEach((r, idx) => {
                        const waveZ   = r.baseZ + waveAmp * Math.sin(freq * 2 * Math.PI * animTime - idx * stag);
                        const spreadZ = r.baseZ - idx * 0.65 * scrollProgress;
                        r.mesh.position.z = waveZ * (1 - scrollProgress) + spreadZ * scrollProgress;
                        r.mesh.getWorldPosition(_ringWorldPos);
                        const ahead = camera.position.z - _ringWorldPos.z;
                        const ringOpacity = Math.max(0, Math.min(1, ahead / 0.30));
                        r.mat.opacity = ringOpacity;
                        r.mat.emissive.lerpColors(_idleColor, _hoverColor, proximity);
                        r.mat.emissiveIntensity = (1.90 + proximity * 2.00) * ringOpacity;
                    });
                }
            }

            spaceNavHint.classList.toggle('visible', scrollProgress > 1.05);

            // ── Form GLB visibility + slow rotation ──
            if (formGroup) {
                const sp2f = scrollProgress - 1.0;
                formGroup.visible = sp2f >= 2.2 && sp2f < 4.2;
                if (formGroup.visible) {
                    _formRotY += 0.004;
                    formGroup.rotation.y = _formRotY;
                    formGroup.position.y = -20 + Math.sin(animTime * 0.38) * 0.08; // gentle float
                }
            }

            // ── Video zone: card visibility + active card highlighting ──
            {
                const vzSP    = scrollProgress - 1.0;
                const vzShow  = vzSP > 0.08 && vzSP < 4.5;
                videoCards.forEach(c => { c.visible = vzShow; });

                if (vzShow) {
                    _videoEls.forEach(v => { if (v.paused) v.play().catch(() => {}); });
                }

                if (scrollTarget === 2 && vzSP > 0.5) {
                    // Active card: brighter flames + gentle float; others: dim
                    videoCards.forEach((c, i) => {
                        const active = i === videoIndex;
                        _flameMats[i].uniforms.uIntensity.value = active ? 1.6 : 0.7;
                        _flameMats[i].uniforms.uTime.value = animTime;
                        // Float active card gently
                        c.position.y = VIDEO_CONFIGS[i].pos.y +
                            (active ? Math.sin(animTime * 0.85) * 0.14 : 0);
                    });
                    _videoZoneLight.intensity = Math.min(1, (vzSP - 0.5) / 0.4) * 180;
                } else {
                    _flameMats.forEach(m => {
                        m.uniforms.uIntensity.value = 0.7;
                        m.uniforms.uTime.value = animTime;
                    });
                    _videoZoneLight.intensity = 0;
                }
                if (carouselHeader) {
                    carouselHeader.classList.toggle('visible', scrollTarget === 2 && vzSP > 0.4 && vzSP < 2.2);
                }
                // Sound toggle — visible whenever in video zone
                if (soundToggleBtn) {
                    const stShow = scrollTarget === 2 && vzSP > 0.55;
                    soundToggleBtn.classList.toggle('visible', stShow);
                    if (!stShow && _soundOn) {
                        // Leaving zone — mute all and reset button
                        _soundOn = false;
                        _videoEls.forEach(v => { v.muted = true; });
                        soundToggleBtn.innerHTML = _SVG_MUTED;
                        soundToggleBtn.classList.remove('sound-on');
                    }
                }
            }

            // ── Contact planet visibility + rotation ──
            {
                const cpSP = scrollProgress - 1.0;
                const cpVisible = cpSP > 2.3 && cpSP < 4.5;
                contactPlanet.grp.visible = cpVisible;
                if (cpVisible) {
                    contactPlanet.grp.rotation.y += 0.0015;
                    contactPlanet.bodyMat.uniforms.uTime.value = animTime;
                }
            }

            // ── Journey dots ──
            // Stage 0=HOME(start) 1=SPACE 2=CONTACT 3=HOME(return)
            const jdStage = scrollProgress < 2 ? 1 : scrollProgress < 4 ? 2 : 3;
            if (jdStage !== _lastJdStage) {
                _lastJdStage = jdStage;
                jdNodes.forEach((n, i) => {
                    n.classList.toggle('active',  i === jdStage);
                    n.classList.toggle('visited', i < jdStage);
                });
                jdLines.forEach((l, i) => l.classList.toggle('filled', i < jdStage));
            }

            // ── Hint text — updates on scrollTarget OR seenVideos size change ──
            {
                const hintKey = `${scrollTarget}:${seenVideos.size}`;
                if (hintKey !== lastScrollState) {
                    lastScrollState = hintKey;
                    let hint = '';
                    if (scrollTarget === 0) {
                        hint = isTouch ? 'tap · swipe to explore' : 'hover · scroll to explore';
                    } else if (scrollTarget === 1) {
                        hint = isTouch ? 'swipe up to continue' : 'scroll to continue';
                    } else if (scrollTarget === 2) {
                        const remaining = Math.max(0, 3 - seenVideos.size);
                        if (remaining > 0) {
                            hint = isTouch
                                ? `swipe ← → or ↑ · ${remaining} more video${remaining > 1 ? 's' : ''}`
                                : `← → or scroll · ${remaining} more video${remaining > 1 ? 's' : ''} to explore`;
                        } else {
                            hint = isTouch ? 'swipe up to reach the contact planet' : 'scroll ↓ to reach the contact planet';
                        }
                    }
                    if (hintEl) hintEl.textContent = hint;
                }
            }

            // Update GPU star uniforms + slow rotation
            if (window._starMat) {
                window._starMat.uniforms.uTime.value = animTime;
                window._starMat.uniforms.uMouseWorld.value.copy(_mouseTarget);
            }
            if (window._starMesh) window._starMesh.rotation.y += 0.00008;
            // Comet lifecycle — one uniform write per frame, all motion in GLSL
            cometMat.uniforms.uTime.value = animTime;

            renderer.render(scene, camera);
        }
        animate();
    </script>

    <!-- ── Studio name glow tracker ── -->
    <script>
    (function () {
        const nameEl  = document.getElementById('studio-name');
        if (!nameEl) return;
        const snWords = Array.from(nameEl.querySelectorAll('.sn-w'));
        let lastProx = -1, lastSp = -1;
        function tick() {
            const prox = window._proximity || 0;
            const sp   = window._scrollProgress || 0;
            if (Math.abs(prox - lastProx) > 0.008 || Math.abs(sp - lastSp) > 0.005) {
                lastProx = prox; lastSp = sp;
                nameEl.style.opacity = Math.max(0, 1 - sp * 5).toFixed(3);
                const g1 = (4  + prox * 10).toFixed(1);
                const g2 = (12 + prox * 18).toFixed(1);
                const g3 = (28 + prox * 30).toFixed(1);
                const a1 = (0.80 + prox * 0.20).toFixed(2);
                const a2 = (0.45 + prox * 0.35).toFixed(2);
                const a3 = (0.20 + prox * 0.20).toFixed(2);
                const glow = `drop-shadow(0 0 ${g1}px rgba(38,178,219,${a1})) drop-shadow(0 0 ${g2}px rgba(38,178,219,${a2})) drop-shadow(0 0 ${g3}px rgba(38,178,219,${a3}))`;
                for (let i = 0; i < snWords.length; i++) snWords[i].style.filter = glow;
            }
            requestAnimationFrame(tick);
        }
        tick();
    })();
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Creative Studio — 3D Creative Agency</title>
    <meta name="description" content="Deep Creative Studio — a 3D creative agency crafting immersive digital experiences, motion design, and interactive web worlds.">
    <meta property="og:title" content="Deep Creative Studio">
    <meta property="og:description" content="Immersive 3D digital experiences and motion design.">
    <meta property="og:type" content="website">
    <link rel="preload" href="logo_3d_optimized.glb" as="fetch" crossorigin>
    <link rel="preload" href="cloud_pulse.webm" as="video" type="video/webm">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.166/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166/examples/jsm/"
      }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000005;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* Loading screen */
        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000005;
            transition: opacity 0.8s ease;
        }
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loader-ring {
            width: 48px;
            height: 48px;
            border: 2px solid rgba(38,178,219,0.15);
            border-top-color: rgba(38,178,219,0.85);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        .loader-label {
            margin-top: 1rem;
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(100, 220, 255, 0.50);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) {
            .loader-ring { animation: none; border-top-color: rgba(38,178,219,0.85); }
        }

        /* Layer 1 — Three.js 3D logo */
        #three-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            cursor: pointer;
            /* CSS glow — respects alpha, never bleeds into background */
            filter: drop-shadow(0 0 3px rgba(38, 178, 219, 0.60))
                    drop-shadow(0 0 1px rgba(118, 224, 250, 0.40));
        }

        /* Layer 2 — vortex image sequence, centered square, screen blend hides black */
        #vortex-canvas {
            position: fixed;
            top: 50%;
            left: 50%;
            width: max(100vw, 100vh);
            height: max(100vw, 100vh);
            mix-blend-mode: screen;
            z-index: 0;
            pointer-events: none;
            filter: brightness(0.4);
            animation: vortex-spin 55s linear infinite;
            transform-origin: center center;
        }

        @keyframes vortex-spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to   { transform: translate(-50%, -50%) rotate(-360deg); }
        }

        /* Layer 3 — star particles, in front of logo and vortex */
        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* Layer 4 — text UI */
        #ui-layer {
            position: fixed;
            bottom: 2rem;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        #hint {
            color: rgba(100, 220, 255, 0.85);
            font-size: 0.82rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            user-select: none;
        }

        /* ── Studio name ── */
        #studio-name {
            position: fixed;
            top: calc(50% + 15vh);
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
            transition: opacity 0.5s ease;
        }

        /* Expanding rule that draws before the words appear */
        .sn-rule {
            height: 1px;
            width: 0;
            margin: 0 auto 14px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(38,178,219,0.25) 15%,
                rgba(118,224,250,0.75) 50%,
                rgba(38,178,219,0.25) 85%,
                transparent 100%
            );
            animation: sn-expand 1s cubic-bezier(0.4,0,0.2,1) 1.3s forwards;
        }
        @keyframes sn-expand { to { width: 220px; } }

        .sn-words {
            display: flex;
            align-items: center;
            gap: 0.65em;
            position: relative;
            overflow: hidden; /* clips the sweep */
        }

        /* Scan-light sweep — mirrors the 3D logo scan beam */
        .sn-words::before {
            content: '';
            position: absolute;
            inset: -30% 0;
            left: -70%;
            width: 45%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(180, 235, 255, 0.22) 40%,
                rgba(220, 248, 255, 0.38) 50%,
                rgba(180, 235, 255, 0.22) 60%,
                transparent 100%
            );
            mix-blend-mode: screen;
            animation: sn-sweep 8s cubic-bezier(0.4, 0, 0.6, 1) 3.2s infinite;
            pointer-events: none;
        }
        @keyframes sn-sweep {
            0%, 65%, 100% { left: -70%; }
            30%            { left: 120%; }
        }

        /* Each word is clipped so the rise plays as a reveal from the rule */
        .sn-clip {
            overflow: hidden;
            padding: 0.12em 0;
        }

        .sn-sep {
            font-size: 0.45rem;
            color: rgba(38, 178, 219, 0.40);
            line-height: 1;
            transform: translateY(2px);
            opacity: 0;
            animation: sn-sep-in 0.3s ease 2.1s forwards;
        }
        @keyframes sn-sep-in { to { opacity: 1; } }

        .sn-w {
            display: block;
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.40em;
            text-transform: uppercase;
            /* Gradient text — cyan edge → white centre → cyan edge */
            background: linear-gradient(
                135deg,
                rgba(38,178,219,0.90)  0%,
                rgba(118,224,250,0.95) 35%,
                rgba(220,248,255,1.00) 50%,
                rgba(118,224,250,0.95) 65%,
                rgba(38,178,219,0.90)  100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Neon depth glow — three layers like the 3D logo */
            filter:
                drop-shadow(0 0  4px rgba(38,178,219,0.80))
                drop-shadow(0 0 12px rgba(38,178,219,0.45))
                drop-shadow(0 0 28px rgba(38,178,219,0.20));
            /* Start hidden below the clip line */
            transform: translateY(115%);
            opacity: 0;
            animation: sn-rise 0.75s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .sn-clip-1 .sn-w { animation-delay: 1.55s; }
        .sn-clip-2 .sn-w { animation-delay: 1.80s; }
        .sn-clip-3 .sn-w { animation-delay: 2.05s; }

        @keyframes sn-rise {
            to { transform: translateY(0); opacity: 1; }
        }

        @media (prefers-reduced-motion: reduce) {
            .sn-rule, .sn-w, .sn-sep { animation: none; width: 220px; opacity: 1; transform: none; }
            .sn-words::before { animation: none; }
        }

        /* Visually hidden — accessible to screen readers, invisible on screen */
        .sr-only {
            position: absolute;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }

        /* Reduce / pause non-essential animations for users who prefer it */
        @media (prefers-reduced-motion: reduce) {
            #vortex-canvas { animation: none !important; }
        }

        /* ── Custom cursor (desktop only) ── */
        @media (hover: hover) and (pointer: fine) {
            * { cursor: none !important; }

            #cursor-dot {
                position: fixed;
                width: 7px;
                height: 7px;
                background: rgba(118, 224, 250, 1);
                border-radius: 50%;
                pointer-events: none;
                z-index: 9999;
                transform: translate(-50%, -50%);
                transition: transform 0.12s ease, background-color 0.2s ease;
                mix-blend-mode: screen;
                will-change: left, top;
            }

            #cursor-ring {
                position: fixed;
                width: 38px;
                height: 38px;
                border: 1.5px solid rgba(38, 178, 219, 0.45);
                border-radius: 50%;
                pointer-events: none;
                z-index: 9998;
                transform: translate(-50%, -50%);
                transition: width 0.35s cubic-bezier(0.25,0.46,0.45,0.94),
                            height 0.35s cubic-bezier(0.25,0.46,0.45,0.94),
                            border-color 0.35s ease,
                            opacity 0.35s ease;
                will-change: left, top;
            }

            /* Expanded state when near a clickable zone */
            #cursor-ring.is-active {
                width: 56px;
                height: 56px;
                border-color: rgba(118, 224, 250, 0.75);
            }

            /* Pulse ripple — grows outward and fades */
            #cursor-ring.is-active::after {
                content: '';
                position: absolute;
                inset: -3px;
                border-radius: 50%;
                border: 1px solid rgba(118, 224, 250, 0.55);
                animation: cursor-pulse 1.1s cubic-bezier(0.2, 0.6, 0.4, 1) infinite;
            }

            @keyframes cursor-pulse {
                0%   { transform: scale(1);   opacity: 0.7; }
                100% { transform: scale(1.9); opacity: 0;   }
            }

            /* Click burst — brief scale flash on the dot */
            #cursor-dot.clicking {
                transform: translate(-50%, -50%) scale(3);
                background: rgba(200, 240, 255, 1);
                transition: transform 0.08s ease, background-color 0.08s ease;
            }
        }

    </style>
</head>
<body>

    <!-- Custom cursor (hidden on touch devices via CSS) -->
    <div id="cursor-dot"  aria-hidden="true"></div>
    <div id="cursor-ring" aria-hidden="true"></div>

    <!-- Loading screen — visible until GLB is ready -->
    <div id="loading-screen" role="status" aria-label="Loading Deep Creative Studio">
        <div class="loader-ring"></div>
        <p class="loader-label">Loading</p>
    </div>

    <!-- Three.js 3D logo -->
    <canvas id="three-canvas" aria-hidden="true"></canvas>

    <!-- Vortex pulse video (decorative) -->
    <video id="vortex-canvas" src="cloud_pulse.webm" muted playsinline preload="auto" aria-hidden="true"></video>

    <!-- Star / meteor background (decorative) -->
    <canvas id="particleCanvas" aria-hidden="true"></canvas>

    <!-- Studio name — below the 3D logo -->
    <div id="studio-name" aria-label="Deep Creative Studio">
        <div class="sn-rule"></div>
        <div class="sn-words">
            <div class="sn-clip sn-clip-1"><span class="sn-w">Deep</span></div>
            <span class="sn-sep">·</span>
            <div class="sn-clip sn-clip-2"><span class="sn-w">Creative</span></div>
            <span class="sn-sep">·</span>
            <div class="sn-clip sn-clip-3"><span class="sn-w">Studio</span></div>
        </div>
    </div>

    <!-- Hint text -->
    <div id="ui-layer">
        <h1 class="sr-only">Deep Creative Studio — Interactive 3D Experience</h1>
        <p id="hint"><!-- text set by JS based on device --></p>
    </div>

    <!-- ── Vortex galaxy particle system ── -->
    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, innerR;
        let stars = [], shooters = [], comets = [];
        let mouseX = 0, mouseY = 0;
        let absorptions = [];

        const STAR_COUNT    = 2000;
        const SHOOTER_COUNT = 16;
        const COMET_COUNT   = 5;
        const DISK_TILT     = 0.85;
        const PULL_R        = 180; // px — wider mouse influence radius
        const COLORS = ['#76e0fa','#26b2db','#009bfc','#005dbd','#ffffff','#4dcfee'];

        class VortexStar {
            constructor() { this.init(false); }
            init(outerSpawn) {
                const maxR     = Math.sqrt((width/2)**2 + (height/2)**2) * 1.05;
                const GRAV_ZONE = Math.min(width, height) * 0.16;
                // Always use the full-field distribution so density stays uniform forever.
                // outerSpawn only controls whether the star fades in (avoids pop-in).
                const t = Math.pow(Math.random(), 0.6);
                this.baseR  = innerR + (maxR - innerR) * t;
                this.r      = this.baseR;
                this.angle  = Math.random() * Math.PI * 2;
                this.size   = Math.random() * 2.4 + 1.1;
                this.color  = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.baseOp = Math.random() * 0.35 + 0.65;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.twinkleRate  = Math.random() * 1.5 + 0.5;
                this.pullOff  = 0;
                this.fadeAlpha = outerSpawn ? 0 : 1;
                this.ownOmega = 0.00225 * Math.sqrt(innerR / Math.max(innerR + 1, this.baseR));
                this.caught   = this.baseR < GRAV_ZONE;
                this.entryR   = this.caught ? this.baseR : null;
                this.dead      = false;
                this.deadTimer = 0;
                this.resistance = Math.random(); // 0 = pulls in easily, 1 = fights and escapes
                this.escaping   = false;
                this.escapeV    = 0;
            }
            update(ms) {
                const scrollP = window._camScrollZ || 0;
                // Gravity zone expands as camera flies in — more stars get caught during scroll
                const GRAV_ZONE = Math.min(width, height) * (0.16 + scrollP * 0.13);

                // Dead — waiting in darkness; when timer expires a new star is born at outer edge
                if (this.dead) {
                    this.deadTimer--;
                    if (this.deadTimer <= 0) {
                        this.init(true); // new star appears far away, fades in slowly
                    }
                    return;
                }

                // Enter gravity zone — point of no return
                if (!this.caught && this.baseR < GRAV_ZONE) {
                    this.caught = true;
                    this.entryR = this.baseR;
                }

                // During scroll, tidal pull drags all free stars gently inward
                if (scrollP > 0 && !this.caught) {
                    this.baseR -= scrollP * 0.35;
                }

                // Magnetic zone — resistant stars fight back but weaken over time
                if (!this.caught) {
                    const MAGNET_ZONE    = GRAV_ZONE * 1.7;
                    const OUTER_DRAG_ZONE = GRAV_ZONE * 2.8;

                    if (this.baseR < MAGNET_ZONE) {
                        const t    = (MAGNET_ZONE - this.baseR) / (MAGNET_ZONE - GRAV_ZONE);
                        const pull = Math.pow(t, 1.5) * 2.2;

                        // No resistance during scroll — everything gets pulled in
                        if (!this.escaping && this.resistance > 0.58 && t > 0.25 && scrollP < 0.05) {
                            this.escaping = true;
                            this.escapeV  = (this.resistance - 0.4) * 5.5 + pull * 1.8;
                        }

                        if (this.escaping && scrollP >= 0.05) {
                            // Scroll started mid-escape — kill resistance immediately
                            this.escaping = false;
                            this.escapeV  = 0;
                        }

                        if (this.escaping) {
                            this.escapeV -= pull * 0.55;
                            this.escapeV  = Math.max(0, this.escapeV);
                            this.baseR   += this.escapeV;

                            if (this.escapeV <= 0) {
                                this.escaping = false;
                                this.caught   = true;
                                this.entryR   = this.baseR;
                            } else if (this.baseR >= MAGNET_ZONE) {
                                this.escaping    = false;
                                this.resistance  = Math.max(0, this.resistance - 0.20);
                            }
                        } else {
                            this.baseR -= pull;
                        }

                    } else if (this.escapeV > 0) {
                        // Outside magnet zone — still feel decreasing drag as they move away
                        if (this.baseR < OUTER_DRAG_ZONE) {
                            const tOuter = (OUTER_DRAG_ZONE - this.baseR) / (OUTER_DRAG_ZONE - MAGNET_ZONE);
                            this.escapeV -= tOuter * 0.30;
                            this.escapeV  = Math.max(0, this.escapeV);
                        }
                        this.baseR  += this.escapeV;
                        this.escapeV *= 0.91;
                        if (this.escapeV < 0.05) this.escapeV = 0;
                    }
                }

                let omega;
                if (!this.caught) {
                    omega = this.ownOmega;
                } else {
                    const speedup = Math.pow(this.entryR / Math.max(innerR + 1, this.baseR), 1.5);
                    omega = this.ownOmega * speedup;
                    const factor = Math.pow(GRAV_ZONE / Math.max(this.baseR, innerR + 1), 2.0);
                    // Spiral slower during scroll so you can see the animation as you fly through
                    const spiralRate = 1 - scrollP * 0.55;
                    this.baseR -= (0.28 + 0.18 * factor) * spiralRate;
                }
                this.angle += omega;

                // Mouse nudge
                const sx = width/2 + Math.cos(this.angle) * this.baseR;
                const sy = height/2 + Math.sin(this.angle) * this.baseR * DISK_TILT;
                const mdist = Math.sqrt((sx - mouseX)**2 + (sy - mouseY)**2);
                if (mdist < PULL_R) {
                    const f = (PULL_R - mdist) / PULL_R;
                    this.pullOff = Math.min(this.pullOff + f * 4.5, 80);
                    if (f > 0.25) this.baseR -= f * 0.5;
                } else {
                    this.pullOff *= 0.78;
                }
                if (!this.caught) {
                    const pulled = this.baseR - this.pullOff;
                    if (pulled <= GRAV_ZONE) {
                        // Reaching the margin triggers vanishing — no sticking to logo border
                        this.caught  = true;
                        this.baseR   = GRAV_ZONE;
                        this.entryR  = GRAV_ZONE;
                        this.pullOff = 0;
                        this.r       = GRAV_ZONE;
                    } else {
                        this.r = pulled;
                    }
                } else {
                    this.r = this.baseR;
                }

                if (this.fadeAlpha < 1) this.fadeAlpha = Math.min(1, this.fadeAlpha + 0.01);

                // Cross event horizon — star is consumed, new one spawns from outer edge immediately
                if (this.baseR <= innerR + 2) {
                    const absX = width/2 + Math.cos(this.angle) * innerR;
                    const absY = height/2 + Math.sin(this.angle) * innerR * DISK_TILT;
                    absorptions.push({ x: absX, y: absY, time: 28, maxTime: 28 });
                    this.init(true); // spawn fresh star from outer edge right away
                    return;
                }

                const eventFade = Math.min(1, Math.max(0, (this.baseR - innerR) / (innerR * 0.7)));
                const edge      = Math.min(1, (this.baseR - innerR) / 50);
                const twinkle   = 0.80 + 0.20 * Math.sin(ms * 0.001 * this.twinkleRate + this.twinklePhase);
                this.opacity    = this.baseOp * edge * twinkle * eventFade * this.fadeAlpha;
            }
            draw() {
                if (this.dead) return;
                const x = width/2  + Math.cos(this.angle) * this.r;
                const y = height/2 + Math.sin(this.angle) * this.r * DISK_TILT;
                ctx.globalAlpha = Math.max(0, this.opacity);
                ctx.fillStyle   = this.color;
                if (this.caught) {
                    const GRAV_ZONE = Math.min(width, height) * (0.16 + (window._camScrollZ || 0) * 0.13);
                    // progress = 1 at gravity zone edge, 0 at event horizon
                    const progress = Math.min(1, Math.max(0, (this.baseR - innerR) / (GRAV_ZONE - innerR)));
                    const sizeFactor = Math.max(0.05, progress * progress);
                    const stretch = 1 + (1 - progress) * 3.5;
                    // Y starts equal to X at boundary (circle) and compresses as star falls in
                    const yScale = Math.max(0.25, progress);
                    const toCenter = Math.atan2(y - height/2, x - width/2);
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(toCenter);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size * sizeFactor * stretch, this.size * sizeFactor * yScale, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                } else {
                    ctx.beginPath();
                    ctx.arc(x, y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        class ShootingStar {
            constructor() { this.reset(true); }
            reset(randomDelay = false) {
                const spawnR = innerR * 4 + Math.random() * Math.min(width, height) * 0.35;
                const spawnA = Math.random() * Math.PI * 2;
                this.x = width  / 2 + Math.cos(spawnA) * spawnR;
                this.y = height / 2 + Math.sin(spawnA) * spawnR * DISK_TILT;
                const tangent = spawnA + Math.PI / 2 + (Math.random() - 0.5) * 0.6;
                const speed   = Math.random() * 6 + 4;
                this.vx = Math.cos(tangent) * speed;
                this.vy = Math.sin(tangent) * speed;
                this.history = [];
                this.opacity  = 0;
                this.size     = Math.random() * 1.2 + 1.0;
                this.active   = false;
                this.timer    = randomDelay ? Math.random() * 400 + 80 : Math.random() * 300 + 120;
            }
            update() {
                if (!this.active) {
                    if (--this.timer <= 0) { this.active = true; this.opacity = 0.9; }
                    return;
                }
                this.history.push({ x: this.x, y: this.y });
                if (this.history.length > 16) this.history.shift();
                this.x += this.vx; this.y += this.vy;
                this.opacity -= 0.008;
                if (this.opacity <= 0 || this.x < -100 || this.x > width+100 || this.y < -100 || this.y > height+100)
                    this.reset();
            }
            draw() {
                if (!this.active || this.opacity <= 0 || this.history.length < 2) return;
                ctx.beginPath();
                ctx.moveTo(this.history[0].x, this.history[0].y);
                this.history.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = `rgba(200,230,255,${this.opacity * 0.6})`;
                ctx.lineWidth   = this.size * 0.8;
                ctx.lineCap     = 'round';
                ctx.shadowBlur  = 12; ctx.shadowColor = '#aaddff';
                ctx.stroke();
                ctx.shadowBlur  = 0;
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle   = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.8, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Comet {
            constructor() { this.spawn(true); }

            spawn(randomDelay) {
                const angle  = Math.random() * Math.PI * 2;
                const r      = innerR * 3.5 + Math.random() * Math.min(width, height) * 0.32;
                this.x       = width/2  + Math.cos(angle) * r;
                this.y       = height/2 + Math.sin(angle) * r * DISK_TILT;
                const tangent = angle + Math.PI / 2;
                const spd    = 0.8 + Math.random() * 0.7;
                this.vx      = Math.cos(tangent) * spd;
                this.vy      = Math.sin(tangent) * spd * DISK_TILT;
                this.history = [];
                this.lit     = false;
                this.size    = 2.2 + Math.random() * 1.2;
                this.color   = ['#60e0ff','#a0d8ff','#ffe0a0','#c0d8ff'][Math.floor(Math.random()*4)];
                this.active  = !randomDelay;
                this.timer   = randomDelay ? Math.random() * 300 + 60 : 0;
                this.life    = 0;
            }

            activate() {

    <script>
        (function () {
            const v            = document.getElementById('vortex-canvas');
            const LOAD_DELAY   = 3000;   // ms before first play
            const GAP_MS       = 4500;   // ms gap between loops
            const FADE_IN_S    = 1.0;    // fade-in duration in seconds
            const FADE_OUT_S   = 1.5;    // fade-out duration in seconds

            v.style.opacity = '0';

            setTimeout(() => v.play(), LOAD_DELAY);

            v.addEventListener('ended', () => {
                setTimeout(() => { v.currentTime = 0; v.play(); }, GAP_MS);
            });

            (function tick() {
                requestAnimationFrame(tick);
                const scrollDepth = window._camScrollZ || 0;
                const hover       = window._proximity  || 0;
                const external    = Math.max(0, (1 - hover * 3) * (1 - scrollDepth * 2.5));

                let videoFade = 0;
                if (!v.paused && !v.ended) {
                    const t   = v.currentTime;
                    const dur = v.duration || 13.17;
                    if      (t < FADE_IN_S)        videoFade = t / FADE_IN_S;
                    else if (t > dur - FADE_OUT_S) videoFade = (dur - t) / FADE_OUT_S;
                    else                           videoFade = 1;
                }

                v.style.opacity = Math.max(0, videoFade * external);
            })();
        })();

        function tick() {
            // Dot snaps directly to cursor
            dot.style.left = mx + 'px';
            dot.style.top  = my + 'px';

            // Ring lerps behind with smooth lag
            rx += (mx - rx) * 0.10;
            ry += (my - ry) * 0.10;
            ring.style.left = rx + 'px';
            ring.style.top  = ry + 'px';

            // Pulse cursor ring when proximity to the 3D logo is high
            const prox = window._proximity || 0;
            const sp   = window._scrollProgress || 0;
            if (prox > 0.06) {
                ring.classList.add('is-active');
            } else {
                ring.classList.remove('is-active');
            }

            // Studio name — fade out on scroll, boost glow on proximity
            const nameEl = document.getElementById('studio-name');
            if (nameEl) {
                // Fade out quickly as camera flies in (sp = 0→1)
                nameEl.style.opacity = Math.max(0, 1 - sp * 5).toFixed(3);
                // Glow intensity grows with proximity — mirrors the 3D logo pulse
                const g1 = (4  + prox * 10).toFixed(1);
                const g2 = (12 + prox * 18).toFixed(1);
                const g3 = (28 + prox * 30).toFixed(1);
                const a1 = (0.80 + prox * 0.20).toFixed(2);
                const a2 = (0.45 + prox * 0.35).toFixed(2);
                const a3 = (0.20 + prox * 0.20).toFixed(2);
                const glow = `drop-shadow(0 0 ${g1}px rgba(38,178,219,${a1})) drop-shadow(0 0 ${g2}px rgba(38,178,219,${a2})) drop-shadow(0 0 ${g3}px rgba(38,178,219,${a3}))`;
                nameEl.querySelectorAll('.sn-w').forEach(w => w.style.filter = glow);
            }

            requestAnimationFrame(tick);
        }
        tick();
    })();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Creative Studio — Hero Light</title>
    <meta name="description" content="Deep Creative Studio — a 3D creative agency crafting immersive digital experiences, motion design, and interactive web worlds.">
    <meta property="og:title" content="Deep Creative Studio">
    <meta property="og:description" content="Immersive 3D digital experiences and motion design.">
    <meta property="og:type" content="website">
    <link rel="preload" href="logo_3d_optimized.glb" as="fetch" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.166/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166/examples/jsm/"
      }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000005;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* Loading screen */
        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000005;
            transition: opacity 0.8s ease;
        }
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loader-ring {
            width: 48px;
            height: 48px;
            border: 2px solid rgba(38,178,219,0.15);
            border-top-color: rgba(38,178,219,0.85);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        .loader-label {
            margin-top: 1rem;
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(100, 220, 255, 0.50);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) {
            .loader-ring { animation: none; border-top-color: rgba(38,178,219,0.85); }
        }

        /* Layer 1 — Three.js 3D logo */
        #three-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            cursor: default;
            /* CSS glow — respects alpha, never bleeds into background */
            filter: drop-shadow(0 0 3px rgba(38, 178, 219, 0.60))
                    drop-shadow(0 0 1px rgba(118, 224, 250, 0.40));
        }


        /* Layer 4 — text UI */
        #ui-layer {
            position: fixed;
            bottom: 2rem;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        #hint {
            color: rgba(100, 220, 255, 0.85);
            font-size: 0.82rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            user-select: none;
        }

        /* ── Studio name ── */
        #studio-name {
            position: fixed;
            top: calc(50% + 15vh);
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
            transition: opacity 0.5s ease;
        }

        /* Expanding rule that draws before the words appear */
        .sn-rule {
            height: 1px;
            width: 0;
            margin: 0 auto 14px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(38,178,219,0.25) 15%,
                rgba(118,224,250,0.75) 50%,
                rgba(38,178,219,0.25) 85%,
                transparent 100%
            );
            animation: sn-expand 1s cubic-bezier(0.4,0,0.2,1) 1.3s forwards;
        }
        @keyframes sn-expand { to { width: 220px; } }

        .sn-words {
            display: flex;
            align-items: center;
            gap: 0.65em;
            position: relative;
            overflow: hidden; /* clips the sweep */
        }

        /* Scan-light sweep — mirrors the 3D logo scan beam */
        .sn-words::before {
            content: '';
            position: absolute;
            inset: -30% 0;
            left: -70%;
            width: 45%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(180, 235, 255, 0.22) 40%,
                rgba(220, 248, 255, 0.38) 50%,
                rgba(180, 235, 255, 0.22) 60%,
                transparent 100%
            );
            mix-blend-mode: screen;
            animation: sn-sweep 8s cubic-bezier(0.4, 0, 0.6, 1) 3.2s infinite;
            pointer-events: none;
        }
        @keyframes sn-sweep {
            0%, 65%, 100% { left: -70%; }
            30%            { left: 120%; }
        }

        /* Each word is clipped so the rise plays as a reveal from the rule */
        .sn-clip {
            overflow: hidden;
            padding: 0.12em 0;
        }

        .sn-sep {
            font-size: 0.45rem;
            color: rgba(38, 178, 219, 0.40);
            line-height: 1;
            transform: translateY(2px);
            opacity: 0;
            animation: sn-sep-in 0.3s ease 2.1s forwards;
        }
        @keyframes sn-sep-in { to { opacity: 1; } }

        .sn-w {
            display: block;
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 0.96rem;
            font-weight: 500;
            letter-spacing: 0.40em;
            text-transform: uppercase;
            /* Gradient text — cyan edge → white centre → cyan edge */
            background: linear-gradient(
                135deg,
                rgba(38,178,219,0.90)  0%,
                rgba(118,224,250,0.95) 35%,
                rgba(220,248,255,1.00) 50%,
                rgba(118,224,250,0.95) 65%,
                rgba(38,178,219,0.90)  100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Neon depth glow — three layers like the 3D logo */
            filter:
                drop-shadow(0 0  4px rgba(38,178,219,0.80))
                drop-shadow(0 0 12px rgba(38,178,219,0.45))
                drop-shadow(0 0 28px rgba(38,178,219,0.20));
            /* Start hidden below the clip line */
            transform: translateY(115%);
            opacity: 0;
            animation: sn-rise 0.75s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .sn-clip-1 .sn-w { animation-delay: 1.55s; }
        .sn-clip-2 .sn-w { animation-delay: 1.80s; }
        .sn-clip-3 .sn-w { animation-delay: 2.05s; }

        @keyframes sn-rise {
            to { transform: translateY(0); opacity: 1; }
        }

        @media (prefers-reduced-motion: reduce) {
            .sn-rule, .sn-w, .sn-sep { animation: none; width: 220px; opacity: 1; transform: none; }
            .sn-words::before { animation: none; }
        }

        /* Visually hidden — accessible to screen readers, invisible on screen */
        .sr-only {
            position: absolute;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }

        /* Reduce / pause non-essential animations for users who prefer it */
        @media (prefers-reduced-motion: reduce) { }

        /* ── Planet / section layers ── */
        .planet-layer {
            position: fixed; inset: 0; z-index: 20;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.8s ease;
        }
        .planet-layer.visible { opacity: 1; pointer-events: auto; }

        .pl-eyebrow {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.62rem; font-weight: 500;
            letter-spacing: 0.38em; text-transform: uppercase;
            color: rgba(100, 220, 255, 0.45);
            margin: 0 0 1rem;
        }
        .pl-title {
            margin: 0 0 0.6rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2rem, 5vw, 3.8rem);
            font-weight: 700; letter-spacing: 0.04em;
            background: linear-gradient(135deg, #a8daff 0%, #ffffff 50%, #70c8ff 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 24px rgba(0,160,255,0.40));
            text-align: center;
        }
        .pl-sub {
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.85rem, 1.6vw, 1.1rem);
            color: rgba(160, 215, 255, 0.55);
            max-width: 480px; text-align: center; line-height: 1.7;
            margin: 0 0 2.4rem; padding: 0 1.5rem;
        }
        .pl-cta {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.72rem; font-weight: 600;
            letter-spacing: 0.25em; text-transform: uppercase;
            color: rgba(100, 200, 255, 0.70);
            border: 1px solid rgba(80, 180, 255, 0.22);
            padding: 0.65rem 1.8rem; border-radius: 2rem;
            background: rgba(0, 40, 80, 0.25);
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: color 0.3s, border-color 0.3s, background 0.3s;
        }
        .pl-cta:hover {
            color: rgba(180, 235, 255, 0.95);
            border-color: rgba(100, 200, 255, 0.50);
            background: rgba(0, 60, 120, 0.35);
        }

        /* Space navigation hint */
        #space-nav-hint {
            position: fixed; bottom: 2rem; left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.60rem; letter-spacing: 0.26em; text-transform: uppercase;
            color: rgba(100, 180, 255, 0.30);
            z-index: 25; pointer-events: none;
            opacity: 0; transition: opacity 0.6s ease;
            white-space: nowrap;
        }
        #space-nav-hint.visible { opacity: 1; }

    </style>
</head>
<body>


    <!-- Loading screen — visible until GLB is ready -->
    <div id="loading-screen" role="status" aria-label="Loading Deep Creative Studio">
        <div class="loader-ring"></div>
        <p class="loader-label">Loading</p>
    </div>

    <!-- Three.js 3D logo -->
    <canvas id="three-canvas" aria-hidden="true"></canvas>


    <!-- Studio name — below the 3D logo -->
    <div id="studio-name" aria-label="Deep Creative Studio">
        <div class="sn-rule"></div>
        <div class="sn-words">
            <div class="sn-clip sn-clip-1"><span class="sn-w">Deep</span></div>
            <span class="sn-sep">·</span>
            <div class="sn-clip sn-clip-2"><span class="sn-w">Creative</span></div>
            <span class="sn-sep">·</span>
            <div class="sn-clip sn-clip-3"><span class="sn-w">Studio</span></div>
        </div>
    </div>

    <!-- Hint text -->
    <div id="ui-layer">
        <h1 class="sr-only">Deep Creative Studio — Interactive 3D Experience</h1>
        <p id="hint"><!-- text set by JS based on device --></p>
    </div>



    <!-- ── Three.js 3D logo (transparent overlay) ── -->
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        const threeCanvas = document.getElementById('three-canvas');

        const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);

        const scene  = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 3.5);

        // Lights — brand-colour palette, visible at rest, brighter on hover
        scene.add(new THREE.AmbientLight(0x1a4a7a, 3.5));
        const key  = new THREE.PointLight(0x66bbff, 22); key.position.set(-2, 2.5, 2.5);   scene.add(key);
        const fill = new THREE.PointLight(0x4499ff, 12); fill.position.set(2.5, 1, 1.5);    scene.add(fill);
        const rim1 = new THREE.PointLight(0x66bbff, 18); rim1.position.set(0.5, 1.8, -2);  scene.add(rim1);
        const rim2 = new THREE.PointLight(0x2255cc, 14); rim2.position.set(-0.5, 1.5, -2); scene.add(rim2);

        // Narrow scan light — sweeps across the logo face like a photocopier/radar beam
        // Short range (0.32) means only a thin vertical strip is lit at any moment
        const scanLight = new THREE.PointLight(0x4499ff, 0, 0.32);
        scene.add(scanLight);
        let scanTimer    = 2.0;
        let scanActive   = false;
        let scanProgress = 0;
        let scanDir      = 1;

        // Idle pulse-flash light — fires on every 2nd idle pulse when not hovering
        // Positioned slightly above and in front so it creates visible depth/shadows
        const pulseFlashLight = new THREE.PointLight(0xaaddff, 0, 0);
        pulseFlashLight.position.set(0, 0.35, 2.0);
        scene.add(pulseFlashLight);
        let pulseFlashActive = false;
        let pulseFlashT      = 0;
        let pulseSineSign    = 1;  // tracks zero-crossings to count completed pulses
        let pulseCounter     = 0;

        // Mouse proximity light — follows cursor, fades in near centre
        const mouseLight = new THREE.PointLight(0x4499ff, 0, 0);
        mouseLight.position.set(0, 0, 1.5);
        scene.add(mouseLight);

        // Mouse → proximity tracking (drives all interactive behaviour)
        const _ray = new THREE.Raycaster();
        const _mouseTarget = new THREE.Vector3(0, 0, 1.5);
        let proximity       = 0; // 0 = far, 1 = dead centre — smoothed each frame
        let targetProximity = 0;

        window.addEventListener('mousemove', e => {
            const nx = (e.clientX / window.innerWidth)  * 2 - 1;
            const ny = -(e.clientY / window.innerHeight) * 2 + 1;
            _ray.setFromCamera({ x: nx, y: ny }, camera);
            _ray.ray.at(2.0, _mouseTarget);
            const screenDist = Math.sqrt(
                (e.clientX - window.innerWidth  / 2) ** 2 +
                (e.clientY - window.innerHeight / 2) ** 2
            );
            const hoverR = Math.min(window.innerWidth, window.innerHeight) * 0.22;
            targetProximity = Math.max(0, 1 - screenDist / hoverR);
        });

        // Subtle env map so clearcoat has something to reflect
        const pmrem = new THREE.PMREMGenerator(renderer);
        pmrem.compileEquirectangularShader();
        scene.environment = pmrem.fromScene(new RoomEnvironment()).texture;
        scene.environmentIntensity = 0.05;
        pmrem.dispose();

        // ── GPU Star Field ──
        // All effects (twinkle, mouse repulsion, sharp spikes) live in GLSL — zero CPU per frame
        const _starCount = 6000;
        {
            const pos   = new Float32Array(_starCount * 3);
            const col   = new Float32Array(_starCount * 3);
            const sizes = new Float32Array(_starCount);

            for (let i = 0; i < _starCount; i++) {
                const r     = 4 + Math.pow(Math.random(), 0.5) * 55;
                const theta = Math.random() * Math.PI * 2;
                const phi   = Math.acos(2 * Math.random() - 1);
                pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
                pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta) * 0.55;
                pos[i*3+2] = r * Math.cos(phi);
                const t    = Math.random();
                col[i*3]   = 0.62 + t * 0.38;
                col[i*3+1] = 0.78 + t * 0.22;
                col[i*3+2] = 0.92 + t * 0.08;
                sizes[i]   = 0.28 + Math.random() * 1.1;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos,   3));
            geo.setAttribute('color',    new THREE.BufferAttribute(col,   3));
            geo.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

            window._starMat = new THREE.ShaderMaterial({
                vertexColors: true,
                transparent: true,
                depthWrite: false,
                uniforms: {
                    uTime:       { value: 0 },
                    uMouseWorld: { value: new THREE.Vector3(999, 999, 999) },
                },
                vertexShader: `
                    attribute float size;
                    varying   vec3  vColor;
                    varying   float vPointSize;
                    varying   float vTwinkle;
                    uniform   float uTime;
                    uniform   vec3  uMouseWorld;

                    void main() {
                        vColor = color;

                        // Per-star seed from position
                        float seed = position.x * 13.7 + position.y * 7.3 + position.z * 4.1;

                        // Twinkle — each star has its own frequency
                        vTwinkle = 0.70 + 0.30 * sin(uTime * (1.4 + mod(abs(seed), 1.9)) + seed);

                        // Mouse repulsion — GPU only, no CPU loop needed
                        vec3  toMouse = position - uMouseWorld;
                        float mDist   = length(toMouse.xy);
                        float repel   = smoothstep(3.8, 0.0, mDist) * 1.4;
                        vec3  pos     = position + normalize(toMouse + vec3(0.001)) * repel;

                        vec4  mv      = modelViewMatrix * vec4(pos, 1.0);
                        float camDist = -mv.z;
                        gl_PointSize  = size * vTwinkle * (300.0 / camDist);
                        vPointSize    = gl_PointSize;
                        gl_Position   = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3  vColor;
                    varying float vPointSize;
                    varying float vTwinkle;

                    void main() {
                        vec2  uv = gl_PointCoord * 2.0 - 1.0;
                        float r  = length(uv);
                        if (r > 1.0) discard;

                        // 4-point diffraction spikes (sharp star shape)
                        float angle  = atan(uv.y, uv.x);
                        float spikes = pow(abs(sin(angle * 2.0)), 10.0);
                        float spike_alpha = spikes * smoothstep(1.0, 0.05, r) * 0.90;

                        // Soft glowing core + wide glow halo
                        float core = smoothstep(0.40, 0.0, r);
                        float halo = smoothstep(1.0,  0.4, r) * 0.15;

                        // Near/bright stars (larger pointSize) get sharp spikes
                        // Distant stars stay as soft glowing blobs
                        float sharpness = smoothstep(2.5, 9.0, vPointSize);
                        float alpha = halo + mix(core * 0.75, core + spike_alpha, sharpness);

                        gl_FragColor = vec4(vColor, alpha * vTwinkle);
                    }
                `
            });

            window._starMesh = new THREE.Points(geo, window._starMat);
            scene.add(window._starMesh);
        }

        // ── Deep-space stars — round dots via ShaderMaterial (no cubes), covers travel path ──
        {
            const COUNT = 3500;
            const pos = new Float32Array(COUNT * 3);
            for (let i = 0; i < COUNT; i++) {
                pos[i*3]   = (Math.random() - 0.5) * 300;
                pos[i*3+1] = (Math.random() - 0.5) * 150;
                pos[i*3+2] = Math.random() * -230 + 50;
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            scene.add(new THREE.Points(geo, new THREE.ShaderMaterial({
                transparent: true, depthWrite: false,
                vertexShader: `
                    void main() {
                        vec4 mv = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = max(1.0, 1.6 * (180.0 / -mv.z));
                        gl_Position  = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    void main() {
                        vec2 uv = gl_PointCoord * 2.0 - 1.0;
                        if (length(uv) > 1.0) discard;
                        float a = (1.0 - length(uv)) * 0.70;
                        gl_FragColor = vec4(0.78, 0.88, 1.0, a);
                    }
                `
            })));
        }

        // ── Procedural planet ──
        const _planetVS = `
            varying vec2 vUv; varying vec3 vNormal;
            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        const _planetFS = `
            uniform float uTime;
            uniform vec3  uCol1; uniform vec3 uCol2; uniform vec3 uCol3;
            varying vec2  vUv;   varying vec3 vNormal;
            void main() {
                float n = sin(vUv.x*11.0+uTime*0.22)*cos(vUv.y*7.0-uTime*0.17)
                        + sin(vUv.x*5.5 -uTime*0.11+vUv.y*9.0)*0.55;
                n = n * 0.5 + 0.5;
                vec3 color = mix(uCol1, uCol2, n);
                color = mix(color, uCol3, smoothstep(0.55, 0.85, n));
                vec3 light = normalize(vec3(0.7, 0.5, 0.8));
                float diff = dot(vNormal, light)*0.5+0.5;
                float limb = pow(max(0.0, dot(vNormal, vec3(0.0,0.0,1.0))), 0.35);
                color *= diff*(0.45+0.55*limb);
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        function makePlanet(cfg) {
            const grp = new THREE.Group();
            grp.position.set(cfg.x, cfg.y, cfg.z);
            const bodyMat = new THREE.ShaderMaterial({
                vertexShader: _planetVS, fragmentShader: _planetFS,
                uniforms: { uTime:{value:0}, uCol1:{value:new THREE.Color(cfg.c1)},
                            uCol2:{value:new THREE.Color(cfg.c2)}, uCol3:{value:new THREE.Color(cfg.c3)} }
            });
            grp.add(new THREE.Mesh(new THREE.SphereGeometry(cfg.r, 56, 56), bodyMat));
            grp.add(new THREE.Mesh(new THREE.SphereGeometry(cfg.r*1.20,32,32),
                new THREE.MeshBasicMaterial({ color:cfg.atm, transparent:true, opacity:0.13,
                    side:THREE.BackSide, blending:THREE.AdditiveBlending, depthWrite:false })));
            grp.add(new THREE.Mesh(new THREE.SphereGeometry(cfg.r*1.55,24,24),
                new THREE.MeshBasicMaterial({ color:cfg.atm, transparent:true, opacity:0.06,
                    side:THREE.BackSide, blending:THREE.AdditiveBlending, depthWrite:false })));
            grp.visible = false;
            scene.add(grp);
            return { grp, bodyMat };
        }

        // Contact Us planet — amber-gold, down-left
        const contactPlanet = makePlanet({
            x:-18, y:-22, z:-118, r:2.2,
            c1:'#1a0800', c2:'#4d1e00', c3:'#cc6200', atm:0xdd5500
        });

        // ── Comet system ──
        // 3 comet slots × 13 segments each = 39 GPU points total.
        // Head + tail positions computed entirely in GLSL from 3 uniforms per comet.
        // CPU cost: 3 uniform writes on click, nothing per frame.
        const COMET_MAX  = 3;
        const COMET_SEGS = 9;
        const COMET_DUR  = 6.0;

        const cSegAttr = new Float32Array(COMET_MAX * COMET_SEGS); // 0=head … 12=tail tip
        const cIdxAttr = new Float32Array(COMET_MAX * COMET_SEGS); // 0,1,2 — which comet
        const cPosAttr = new Float32Array(COMET_MAX * COMET_SEGS * 3);
        for (let ci = 0; ci < COMET_MAX; ci++) {
            for (let s = 0; s < COMET_SEGS; s++) {
                const v = ci * COMET_SEGS + s;
                cSegAttr[v]   = s;
                cIdxAttr[v]   = ci;
                cPosAttr[v*3] = 9999; // static placeholder — real pos in vertex shader
            }
        }
        const cGeo = new THREE.BufferGeometry();
        cGeo.setAttribute('position', new THREE.BufferAttribute(cPosAttr, 3));
        cGeo.setAttribute('aSegment', new THREE.BufferAttribute(cSegAttr, 1));
        cGeo.setAttribute('aComet',   new THREE.BufferAttribute(cIdxAttr, 1));

        const _cStart = [new THREE.Vector3(999,0,0), new THREE.Vector3(999,0,0), new THREE.Vector3(999,0,0)];
        const _cDir   = [new THREE.Vector3(1,0,0),   new THREE.Vector3(1,0,0),   new THREE.Vector3(1,0,0)];
        const _cBirth = [-999, -999, -999];

        const cometMat = new THREE.ShaderMaterial({
            transparent: true,
            depthWrite:  false,
            uniforms: {
                uTime:       { value: 0 },
                uCometStart: { value: _cStart },
                uCometDir:   { value: _cDir   },
                uCometBirth: { value: _cBirth  },
            },
            vertexShader: `
                attribute float aSegment;
                attribute float aComet;
                varying   float vSeg;
                varying   float vLife;

                uniform float uTime;
                uniform vec3  uCometStart[3];
                uniform vec3  uCometDir[3];
                uniform float uCometBirth[3];

                void main() {
                    // Select this comet's data (if-else for WebGL 1.0 safety)
                    vec3  cStart; vec3 cDir; float cBirth;
                    if      (aComet < 0.5) { cStart=uCometStart[0]; cDir=uCometDir[0]; cBirth=uCometBirth[0]; }
                    else if (aComet < 1.5) { cStart=uCometStart[1]; cDir=uCometDir[1]; cBirth=uCometBirth[1]; }
                    else                   { cStart=uCometStart[2]; cDir=uCometDir[2]; cBirth=uCometBirth[2]; }

                    float age  = uTime - cBirth;
                    float t    = clamp(age / ${COMET_DUR.toFixed(1)}, 0.0, 1.05);

                    // Head moves at 2.5 world-units per second; tail trails behind
                    vec3  head = cStart + cDir * age * 2.5;
                    vec3  pos  = head   - cDir * aSegment * 0.18;

                    // Soft fade-in → hold → fade-out
                    float life = smoothstep(0.0, 0.14, t) * (1.0 - smoothstep(0.65, 1.0, t));

                    // Head = 13 px, tail tip ~ 1 px — small and distant
                    float segN = aSegment / float(${COMET_SEGS - 1});
                    float sz   = (1.0 - segN * 0.92) * life * 13.0;

                    vSeg  = segN;
                    vLife = life;
                    gl_PointSize = max(sz, 0.0);
                    gl_Position  = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                }
            `,
            fragmentShader: `
                varying float vSeg;
                varying float vLife;

                void main() {
                    vec2  uv = gl_PointCoord * 2.0 - 1.0;
                    float r  = length(uv);
                    if (r > 1.0) discard;

                    // Soft diffuse glow — no rays, no starburst, just a distant natural light
                    float core  = smoothstep(0.32, 0.0, r);
                    float bloom = smoothstep(1.0, 0.18, r) * 0.28 * step(vSeg, 0.04);

                    float alpha = (core + bloom) * vLife * (1.0 - vSeg * 0.88);

                    // Faint white-blue — looks like a real distant comet, not a firework
                    vec3  col = mix(vec3(0.42, 0.74, 1.00), vec3(0.92, 0.96, 1.00),
                                   (1.0 - vSeg) * core);

                    gl_FragColor = vec4(col, alpha);
                }
            `
        });

        const cometMesh = new THREE.Points(cGeo, cometMat);
        cometMesh.frustumCulled = false; // positions are computed in shader, not geometry
        scene.add(cometMesh);

        // ── Animation constants ──
        const IDLE_AMP  = 0.12,  IDLE_FREQ  = 0.50, IDLE_STAG  = 0.38;
        const PULSE_AMP = 0.34,  PULSE_FREQ = 0.62, PULSE_STAG = 0.45;

        const rings = [];
        const logoMaterials = [];   // non-ring materials (sparkles etc.)
        const _idleColor    = new THREE.Color('#26b2db');
        const _hoverColor   = new THREE.Color('#76e0fa');
        const _ringWorldPos = new THREE.Vector3();
        let animTime   = 0;
        let _cometSlot = 0;

        // ── Scroll state ──
        // 0 = hero  1 = inside logo  2-4 = space travel  5 = loop-back snap
        let scrollTarget   = 0;
        let scrollProgress = 0;
        const MAX_SCROLL   = 5;

        // Camera waypoints — active when scrollProgress > 1 (sp = scrollProgress - 1)
        // Straight dive → gentle tilt to planet → smooth arc back to hero entrance.
        const SPACE_WP = [
            { pos: new THREE.Vector3(  0,   0,  -2.5), look: new THREE.Vector3(  0,   0, -25)  }, // sp=0 exit hero
            { pos: new THREE.Vector3(  0,   0,  -58),  look: new THREE.Vector3(  0,   0, -95)  }, // sp=1 deep straight
            { pos: new THREE.Vector3( -5,  -6,  -78),  look: new THREE.Vector3(-18, -22,-118)  }, // sp=2 gentle tilt to planet
            { pos: new THREE.Vector3(-18, -14, -102),  look: new THREE.Vector3(-18, -22,-118)  }, // sp=3 arrived Contact Us
            { pos: new THREE.Vector3(  0,   0,   3.5), look: new THREE.Vector3(  0,   0,   0)  }, // sp=4 hero entrance (return arc)
        ];
        const _wpCamPos = new THREE.Vector3();
        const _wpLookAt = new THREE.Vector3();
        const _tmpCam2  = new THREE.PerspectiveCamera();
        const _heroLook = new THREE.Vector3(0, 0, -25); // always look forward so exit matches WP[0]

        // DOM layer refs
        const contactLayer = document.getElementById('contact-layer');
        const spaceNavHint = document.getElementById('space-nav-hint');

        // Dismiss loading screen once GLB is ready
        function dismissLoader() {
            const ls = document.getElementById('loading-screen');
            ls.classList.add('hidden');
            setTimeout(() => ls.remove(), 900);
        }

        new GLTFLoader().load('./logo_3d_optimized.glb', gltf => {
            const model  = gltf.scene;
            const box    = new THREE.Box3().setFromObject(model);
            const centre = box.getCenter(new THREE.Vector3());
            const size   = box.getSize(new THREE.Vector3()).length();
            model.position.sub(centre);
            model.scale.setScalar(0.48 / size);
            scene.add(model);

            dismissLoader();

            let i = 0;
            model.traverse(child => {
                if (child.isMesh && child.material) {
                    const m = child.material;
                    // Strip every Blender-baked map so they can't override our colour
                    m.map          = null;
                    m.normalMap    = null;
                    m.roughnessMap = null;
                    m.metalnessMap = null;
                    m.emissiveMap  = null;
                    m.aoMap        = null;
                    m.color.set('#26b2db');
                    m.emissive.set('#26b2db');
                    m.emissiveIntensity = 0.60;
                    m.roughness  = 0.05;
                    m.metalness  = 0.40;
                    m.needsUpdate = true;
                    if (child.name.startsWith('Curve')) {
                        // Clone so each ring can fade independently during scroll
                        const ringMat = m.clone();
                        ringMat.transparent = true;
                        ringMat.opacity     = 1;
                        child.material      = ringMat;
                        rings.push({ mesh: child, baseZ: child.position.z, mat: ringMat });
                        i++;
                    } else {
                        logoMaterials.push(m); // sparkles + other non-ring meshes
                    }
                }
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        let scrollLocked = false;

        function flyLock() {
            scrollLocked = true;
            const check = setInterval(() => {
                if (Math.abs(scrollProgress - scrollTarget) < 0.03) { scrollLocked = false; clearInterval(check); }
            }, 100);
        }

        window.addEventListener('wheel', e => {
            e.preventDefault();
            if (scrollLocked) return;
            if (e.deltaY > 0 && scrollTarget < MAX_SCROLL) { scrollTarget++; flyLock(); }
            else if (e.deltaY < 0 && scrollTarget > 0)     { scrollTarget--; flyLock(); }
        }, { passive: false });

        let _touchStartY = null;
        window.addEventListener('touchstart', e => {
            _touchStartY = e.touches[0].clientY;
        }, { passive: true });
        window.addEventListener('touchend', e => {
            if (_touchStartY === null) return;
            const dy = _touchStartY - e.changedTouches[0].clientY;
            _touchStartY = null;
            if (scrollLocked || Math.abs(dy) < 40) return;
            if (dy > 0 && scrollTarget < MAX_SCROLL) { scrollTarget++; flyLock(); }
            else if (dy < 0 && scrollTarget > 0)     { scrollTarget--; flyLock(); }
        }, { passive: true });

        // Touch mousemove proxy — drives comet ignition and proximity on touch devices
        window.addEventListener('touchmove', e => {
            const t = e.touches[0];
            mouseX = t.clientX; mouseY = t.clientY;
        }, { passive: true });

        // Click in sky — launch a comet through the clicked point
        // The comet is already at full brightness when it appears there,
        // then travels across the starfield and fades into the dark.
        window.addEventListener('click', e => {
            if (targetProximity > 0.15) return; // don't intercept logo clicks

            const nx = (e.clientX / window.innerWidth)  * 2 - 1;
            const ny = -(e.clientY / window.innerHeight) * 2 + 1;
            _ray.setFromCamera({ x: nx, y: ny }, camera);

            // Place the comet deep in the sky — far enough to look genuinely distant
            const dist = 38 + Math.random() * 16;
            const pt   = _ray.ray.at(dist, new THREE.Vector3());

            // Fully random travel direction across the sphere
            const th      = Math.random() * Math.PI * 2;
            const ph      = Math.acos(2 * Math.random() - 1);
            const moveDir = new THREE.Vector3(
                Math.sin(ph) * Math.cos(th),
                Math.sin(ph) * Math.sin(th),
                Math.cos(ph)
            ).normalize();

            // Start behind the click point so comet is fully lit when it arrives there
            const preTravel = 1.2 + Math.random() * 0.6; // seconds already travelled
            const startPos  = pt.clone().addScaledVector(moveDir, -(preTravel * 3.0));

            const slot = _cometSlot % COMET_MAX;
            _cometSlot++;
            cometMat.uniforms.uCometStart.value[slot].copy(startPos);
            cometMat.uniforms.uCometDir.value[slot].copy(moveDir);
            cometMat.uniforms.uCometBirth.value[slot] = animTime - preTravel;
        });

        // Click on logo scrolls IN only — scroll back is wheel/swipe only
        window.addEventListener('click', () => {
            if (targetProximity < 0.05 || scrollLocked || scrollTarget > 0.5) return;
            scrollTarget = 1;
            scrollLocked = true;
            const check = setInterval(() => {
                if (Math.abs(scrollProgress - scrollTarget) < 0.03) {
                    scrollLocked = false;
                    clearInterval(check);
                }
            }, 100);
        });


        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const isTouch = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
        const hintEl  = document.getElementById('hint');
        let   lastScrollState = -1;
        let   _threeRunning   = true;

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                _threeRunning = false;
            } else {
                _threeRunning = true;
                clock.getDelta(); // discard the huge accumulated delta from hidden time
                animate();
            }
        });

        const clock = new THREE.Clock();
        function animate() {
            if (!_threeRunning) return;
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            animTime += dt;

            // Scroll boosts proximity so logo lights up before fly-through begins
            targetProximity = Math.max(targetProximity, scrollTarget * Math.max(0, 1 - scrollProgress * 2));

            // Smoothly chase target proximity (ease in fast, ease out slower)
            const lerpSpeed = targetProximity > proximity ? 0.06 : 0.025;
            proximity += (targetProximity - proximity) * lerpSpeed;

            // Skip scan beam + pulse flash when user prefers reduced motion
            if (prefersReducedMotion) { renderer.render(scene, camera); return; }

            // Narrow scan beam — moves linearly left→right (or right→left) very close to the logo face
            // Limited range means only a thin vertical strip of the logo is lit at any moment
            scanTimer -= dt;
            if (scanTimer <= 0 && !scanActive) {
                scanActive    = true;
                scanProgress  = 0;
                scanDir       = Math.random() < 0.5 ? 1 : -1;
                scanTimer     = Math.random() * 3 + 3;
            }
            if (scanActive) {
                scanProgress += dt / 2.2; // 2.2 s to cross the full logo width
                const x    = scanDir * (scanProgress * 2 - 1) * 0.65; // -0.65 → +0.65
                const fade = Math.sin(scanProgress * Math.PI);         // ramp in/out
                scanLight.position.set(x, 0, 0.18);                   // very close to logo face
                scanLight.intensity = fade * 55;
                if (scanProgress >= 1) { scanActive = false; scanLight.intensity = 0; }
            }

            // Fire a soft light-up on every idle pulse, from a randomly chosen angle each time
            const sineNow = Math.sin(IDLE_FREQ * 2 * Math.PI * animTime);
            if (pulseSineSign < 0 && sineNow >= 0 && !pulseFlashActive && proximity < 0.12) {
                pulseFlashActive = true;
                pulseFlashT      = 0;
                // True random angle — full sphere around the logo every flash
                const a    = Math.random() * Math.PI * 2;          // any horizontal direction
                const dist = 2.0 + Math.random() * 1.2;           // distance from origin
                const yPos = (Math.random() - 0.4) * 4.0;         // -1.6 … +2.4 (below → high above)
                pulseFlashLight.position.set(
                    Math.cos(a) * dist,                            // left / right
                    yPos,                                          // below / above
                    Math.sin(a) * dist * 0.45 + 0.7               // behind / in front (mostly front)
                );
            }
            pulseSineSign = sineNow < 0 ? -1 : 1;

            if (pulseFlashActive) {
                pulseFlashT += dt;
                const dur = 1.4;
                const t   = pulseFlashT / dur;
                // Asymmetric ease: quick soft ramp-in, long gentle fade-out
                const bell = t < 0.25
                    ? Math.sin((t / 0.25) * Math.PI * 0.5)
                    : Math.cos(((t - 0.25) / 0.75) * Math.PI * 0.5);
                pulseFlashLight.intensity = Math.max(0, bell * 220);
                logoMaterials.forEach(m => { m.emissiveIntensity = 1.90 + bell * 6.0; });
                if (pulseFlashT >= dur) { pulseFlashActive = false; pulseFlashLight.intensity = 0; }
            }

            // All scene lights — gentle hover boost, kept low to avoid oversaturation to yellow
            key.intensity   = 48 + proximity * 10;
            fill.intensity  = 28 + proximity *  8;
            rim1.intensity  = 36 + proximity * 10;
            rim2.intensity  = 28 + proximity *  6;
            mouseLight.position.lerp(_mouseTarget, 0.10);
            mouseLight.intensity = proximity * 14;

            // Smooth scroll progress
            // Smooth return — after arc completes, hero logic glides camera home
            if (scrollTarget >= MAX_SCROLL && scrollProgress >= MAX_SCROLL - 0.08) {
                scrollProgress = 0;
                scrollTarget   = 0;
                // No camera.position force — hero lerp handles the landing naturally
            }

            scrollProgress += (scrollTarget - scrollProgress) * 0.055;

            const inHero = scrollProgress <= 1.0;

            // ── Camera ──
            if (inHero) {
                // Hero fly-through
                const hoverZ  = 3.5 - proximity * 0.45 * (1 - scrollProgress);
                const flyZ    = 3.5 - scrollProgress * 6.0;
                const targetZ = hoverZ + (flyZ - hoverZ) * scrollProgress;
                camera.position.x += (0 - camera.position.x) * 0.10;
                camera.position.y += (0 - camera.position.y) * 0.10;
                camera.position.z += (targetZ - camera.position.z) * 0.06;
                _tmpCam2.position.copy(camera.position);
                _tmpCam2.up.set(0, 1, 0);
                _tmpCam2.lookAt(_heroLook);
                camera.quaternion.slerp(_tmpCam2.quaternion, 0.10);
                contactPlanet.grp.visible = false;
            } else {
                // Space travel — camera follows waypoints
                contactPlanet.grp.visible = true;
                const sp  = scrollProgress - 1.0;
                const i0  = Math.min(Math.floor(sp), SPACE_WP.length - 2);
                const raw = sp - i0;
                const et  = raw * raw * (3 - 2 * raw); // smoothstep
                _wpCamPos.lerpVectors(SPACE_WP[i0].pos, SPACE_WP[i0 + 1].pos, et);
                _wpLookAt.lerpVectors(SPACE_WP[i0].look, SPACE_WP[i0 + 1].look, et);
                camera.position.lerp(_wpCamPos, 0.055);
                _tmpCam2.position.copy(camera.position);
                _tmpCam2.up.set(0, 1, 0);
                _tmpCam2.lookAt(_wpLookAt);
                camera.quaternion.slerp(_tmpCam2.quaternion, 0.028);
            }

            // Share camera depth with particle canvas (hero only — 0..1 range)
            window._camScrollZ    = Math.max(0, Math.min(1, (3.5 - Math.min(camera.position.z, 3.5)) / 6.0));
            window._proximity     = proximity;
            window._scrollProgress = scrollProgress;

            // ── Logo animation — hero only ──
            if (inHero) {
                logoMaterials.forEach(m => {
                    m.emissive.lerpColors(_idleColor, _hoverColor, proximity);
                    m.emissiveIntensity = 1.90 + proximity * 2.00;
                });

                const amp  = IDLE_AMP  + (PULSE_AMP  - IDLE_AMP)  * proximity;
                const freq = IDLE_FREQ + (PULSE_FREQ - IDLE_FREQ) * proximity;
                const stag = IDLE_STAG + (PULSE_STAG - IDLE_STAG) * proximity;
                const waveAmp = amp * Math.max(0, 1 - scrollProgress * 4);

                rings.forEach((r, idx) => {
                    const waveZ   = r.baseZ + waveAmp * Math.sin(freq * 2 * Math.PI * animTime - idx * stag);
                    const spreadZ = r.baseZ - idx * 0.65 * scrollProgress;
                    r.mesh.position.z = waveZ * (1 - scrollProgress) + spreadZ * scrollProgress;
                    r.mesh.getWorldPosition(_ringWorldPos);
                    const ahead = camera.position.z - _ringWorldPos.z;
                    const ringOpacity = Math.max(0, Math.min(1, ahead / 0.30));
                    r.mat.opacity = ringOpacity;
                    r.mat.emissive.lerpColors(_idleColor, _hoverColor, proximity);
                    r.mat.emissiveIntensity = (1.90 + proximity * 2.00) * ringOpacity;
                });
            }

            // ── Contact Us planet visibility ──
            const sp2 = scrollProgress - 1.0;
            const contactVisible = sp2 > 1.7 && sp2 < 3.2;
            contactLayer.classList.toggle('visible', contactVisible);
            contactLayer.setAttribute('aria-hidden', String(!contactVisible));
            spaceNavHint.classList.toggle('visible', scrollProgress > 1.05 && !contactVisible);

            // ── Planet rotation + shader ──
            if (!inHero) {
                contactPlanet.grp.rotation.y += 0.0015;
                contactPlanet.bodyMat.uniforms.uTime.value = animTime;
            }

            // ── Hint text ──
            if (scrollTarget !== lastScrollState) {
                lastScrollState = scrollTarget;
                const hints = [
                    isTouch ? 'tap · swipe up to explore' : 'hover · scroll to explore',
                    isTouch ? 'swipe up to continue'      : 'scroll to continue',
                    '', '', '', '',
                ];
                if (hintEl) hintEl.textContent = hints[Math.min(scrollTarget, hints.length - 1)] || '';
            }

            // Update GPU star uniforms + slow rotation
            if (window._starMat) {
                window._starMat.uniforms.uTime.value = animTime;
                window._starMat.uniforms.uMouseWorld.value.copy(_mouseTarget);
            }
            if (window._starMesh) window._starMesh.rotation.y += 0.00008;
            // Comet lifecycle — one uniform write per frame, all motion in GLSL
            cometMat.uniforms.uTime.value = animTime;

            renderer.render(scene, camera);
        }
        animate();
    </script>


    <!-- ── Space navigation hint ── -->
    <div id="space-nav-hint">scroll to continue the journey</div>

    <!-- ── Contact Us planet layer ── -->
    <div id="contact-layer" class="planet-layer" aria-hidden="true">
        <p class="pl-eyebrow" style="color:rgba(255,160,60,0.50)">Let's Talk</p>
        <h2 class="pl-title" style="background:linear-gradient(135deg,#ff9a3c 0%,#ffffff 50%,#ffb86c 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 24px rgba(220,90,0,0.45))">Contact Us</h2>
        <p class="pl-sub" style="color:rgba(255,180,100,0.55)">Ready to build something extraordinary? Let's talk — we craft digital experiences that leave a mark across space and time.</p>
        <button class="pl-cta" style="color:rgba(255,160,60,0.75);border-color:rgba(200,100,0,0.28);background:rgba(80,20,0,0.28)">Start a Project</button>
    </div>

    <!-- ── Studio name glow tracker ── -->
    <script>
    (function () {
        const nameEl  = document.getElementById('studio-name');
        if (!nameEl) return;
        const snWords = Array.from(nameEl.querySelectorAll('.sn-w'));
        let lastProx = -1, lastSp = -1;
        function tick() {
            const prox = window._proximity || 0;
            const sp   = window._scrollProgress || 0;
            if (Math.abs(prox - lastProx) > 0.008 || Math.abs(sp - lastSp) > 0.005) {
                lastProx = prox; lastSp = sp;
                nameEl.style.opacity = Math.max(0, 1 - sp * 5).toFixed(3);
                const g1 = (4  + prox * 10).toFixed(1);
                const g2 = (12 + prox * 18).toFixed(1);
                const g3 = (28 + prox * 30).toFixed(1);
                const a1 = (0.80 + prox * 0.20).toFixed(2);
                const a2 = (0.45 + prox * 0.35).toFixed(2);
                const a3 = (0.20 + prox * 0.20).toFixed(2);
                const glow = `drop-shadow(0 0 ${g1}px rgba(38,178,219,${a1})) drop-shadow(0 0 ${g2}px rgba(38,178,219,${a2})) drop-shadow(0 0 ${g3}px rgba(38,178,219,${a3}))`;
                for (let i = 0; i < snWords.length; i++) snWords[i].style.filter = glow;
            }
            requestAnimationFrame(tick);
        }
        tick();
    })();
    </script>

</body>
